<style>

  #controls { display: flex; gap: 7px; flex-wrap: wrap; justify-content: flex-end; }

// ── AUDIO ENGINE ─────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
const CLIPS = {};
const CLIP_FILES = {
  right1:'right1.wav', right2:'right2.wav', right3:'right3.wav',
  right4:'right4.wav', right5:'right5.wav',
  wrong1:'wrong1.wav', wrong2:'wrong2.wav',
  winner1:'winner1.wav', winner2:'winner2.wav',
};
async function preloadClips() {
  const ctx = getAudio();
  await Promise.all(Object.entries(CLIP_FILES).map(async ([key, file]) => {
    try {
      const res = await fetch(file);
      const buf = await res.arrayBuffer();
      CLIPS[key] = await ctx.decodeAudioData(buf);
    } catch(e) { console.warn('Could not load', file); }
  }));
}
function playClip(buffer) {
  if (!buffer) return;
  const ctx = getAudio();
  const src = ctx.createBufferSource();
  src.buffer = buffer; src.connect(ctx.destination); src.start(0);
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function soundCorrect() { playClip(pick([CLIPS.right1,CLIPS.right2,CLIPS.right3,CLIPS.right4,CLIPS.right5])); }
function soundWrong()   { playClip(CLIPS.wrong1); }
function soundModeSwitch(toMode) { playClip(toMode === 'silhouette' ? CLIPS.winner1 : CLIPS.winner2); }
function soundStart() {
  const ctx = getAudio(); const t = ctx.currentTime;
  function pt(f,type,d,v,s){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.setValueAtTime(f,s);g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.start(s);o.stop(s+d);}
  [261,329,392,523].forEach((f,i)=>pt(f,'triangle',0.18,0.3,t+i*0.1));
  setTimeout(()=>pt(784,'triangle',0.4,0.35,getAudio().currentTime),450);
}
function soundSurprise() {
  const ctx = getAudio(); const t = ctx.currentTime;
  function pt(f,type,d,v,s){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.setValueAtTime(f,s);g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.start(s);o.stop(s+d);}
  pt(400,'sine',0.06,0.2,t); pt(600,'sine',0.1,0.2,t+0.07);
}

// ── LETTER SPELLING (Web Speech API) ─────────────────────────
function spellName(name) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  // Clean name for spelling — strip special chars like ♀ ♂
  const clean = name.replace(/[^a-zA-Z\s\-\.]/g, '');
  const letters = clean.split('');
  let i = 0;
  function speakNext() {
    if (i >= letters.length) return;
    const ch = letters[i];
    if (ch === ' ' || ch === '-' || ch === '.') { i++; speakNext(); return; }
    const u = new SpeechSynthesisUtterance(ch);
    u.rate = 0.85; u.pitch = 1.1; u.volume = 1.0;
    u.onend = () => { i++; setTimeout(speakNext, 80); };
    window.speechSynthesis.speak(u);
  }
  speakNext();
}

  // ═══ MEGA EVOLUTIONS — GEN 3 ═══
  {id:"mega-254", name:"Mega Sceptile",  types:["grass","dragon"],   evolvesTo:null, mega:true, clue:"🦎 Sceptile — now also a Dragon type!"},
  {id:"mega-257", name:"Mega Blaziken",  types:["fire","fighting"],  evolvesTo:null, mega:true, clue:"🔥 Blaziken even faster and stronger"},
  {id:"mega-260", name:"Mega Swampert",  types:["water","ground"],   evolvesTo:null, mega:true, clue:"💧 Swampert gets huge muscles"},
  {id:"mega-282", name:"Mega Gardevoir", types:["psychic","fairy"],  evolvesTo:null, mega:true, clue:"✨ Gardevoir's dress gets even bigger"},
  {id:"mega-302", name:"Mega Sableye",   types:["dark","ghost"],     evolvesTo:null, mega:true, clue:"💎 Sableye hides behind a massive gem"},
  {id:"mega-334", name:"Mega Altaria",   types:["dragon","fairy"],   evolvesTo:null, mega:true, clue:"☁️ Altaria — now a Fairy type with huge clouds"},
  {id:"mega-359", name:"Mega Absol",     types:["dark"],             evolvesTo:null, mega:true, clue:"⚡ Absol with angel wings and bigger blade"},
  {id:"mega-373", name:"Mega Salamence", types:["dragon","flying"],  evolvesTo:null, mega:true, clue:"🐉 Salamence's wings merge into one giant wing"},
  {id:"mega-376", name:"Mega Metagross", types:["steel","psychic"],  evolvesTo:null, mega:true, clue:"🤖 Metagross — extra legs and spikes everywhere"},
  {id:"mega-380", name:"Mega Latias",    types:["dragon","psychic"], evolvesTo:null, mega:true, clue:"❤️ Mega Latias — faster and more graceful"},
  {id:"mega-381", name:"Mega Latios",    types:["dragon","psychic"], evolvesTo:null, mega:true, clue:"💙 Mega Latios — fastest dragon in the sky"},
];

function spriteUrl(id) {
  if (typeof id === "string" && id.startsWith("mega-")) {
    const megaMap = {
      "mega-3":"10033","mega-6x":"10034","mega-6y":"10035","mega-9":"10036",
      "mega-15":"10090","mega-18":"10073","mega-65":"10044","mega-80":"10045",
      "mega-94":"10046","mega-115":"10047","mega-127":"10048","mega-130":"10049",
      "mega-142":"10051","mega-150x":"10052","mega-150y":"10053",
      "mega-254":"10065","mega-257":"10066","mega-260":"10067","mega-282":"10068",
      "mega-302":"10069","mega-334":"10070","mega-359":"10071","mega-373":"10072",
      "mega-376":"10074","mega-380":"10075","mega-381":"10076",
    };
    const n = megaMap[id];
    return n
      ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${n}.png`
      : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id.replace("mega-","")}.png`;
  }
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
}

const POKEMON_BY_ID = {};
POKEMON.forEach(p => { POKEMON_BY_ID[p.id] = p; });

// ── STATE ────────────────────────────────────────────────────
let current = null;
let mode = "explore";
let whoAnswered = false;
let favorites = [];

// ── HELPERS ──────────────────────────────────────────────────
function getColors(type) { return TYPE_COLORS[type] || TYPE_COLORS.normal; }

function setBackground(type) {
  const c = getColors(type);
  document.getElementById("app").style.background =
    `linear-gradient(160deg, ${c.bg} 0%, ${c.light} 52%, #ffffff 100%)`;
  const sb = document.getElementById("surprise-btn");
  if (sb) { sb.style.background = c.bg; sb.style.boxShadow = `0 8px 28px ${c.bg}bb`; }
  const gb = document.getElementById("guess-btn");
  if (mode === "silhouette") { gb.style.background="white"; gb.style.color=c.bg; }
  else { gb.style.background="rgba(255,255,255,0.28)"; gb.style.color="white"; }
}

// ── MAIN RENDER ──────────────────────────────────────────────
function renderPokemon(p) {
  current = p; whoAnswered = false;
  const mainType = p.types[0];
  const isSilhouette = (mode === "silhouette");
  setBackground(mainType);

  document.getElementById("poke-number").textContent =
    typeof p.id === "number" ? "#" + String(p.id).padStart(3,"0") : "";
  document.getElementById("mega-badge").style.display = p.mega ? "inline-block" : "none";

  // Image — filter BEFORE src
  const img = document.getElementById("poke-img");
  img.style.filter = isSilhouette
    ? "brightness(0) drop-shadow(0 6px 18px rgba(0,0,0,0.4))"
    : "drop-shadow(0 8px 28px rgba(0,0,0,0.22))";
  img.classList.remove("popin"); void img.offsetWidth;
  img.src = spriteUrl(p.id); img.classList.add("popin");

  // Name — apply mask styles BEFORE setting textContent
  const nameEl = document.getElementById("poke-name");
  if (isSilhouette) {
    Object.assign(nameEl.style, {
      color:"transparent", background:"#555",
      borderRadius:"12px", padding:"4px 28px", textShadow:"none"
    });
    nameEl.textContent = p.name;  // written while already masked
  } else {
    Object.assign(nameEl.style, {
      color:"#1a1a1a", background:"transparent",
      borderRadius:"0", padding:"0",
      textShadow:"0 2px 8px rgba(0,0,0,0.08)"
    });
    nameEl.textContent = p.name;
  }

  // Clue
  const clueEl = document.getElementById("poke-clue");
  if (isSilhouette && p.clue) {
    clueEl.textContent = "💡 " + p.clue;
    clueEl.style.display = "block";
  } else {
    clueEl.style.display = "none";
  }

  const typesEl = document.getElementById("types");
  const factEl  = document.getElementById("fact-box");
  document.getElementById("who-result").textContent = "";

  if (isSilhouette) {
    typesEl.innerHTML = ""; factEl.style.display = "none";
    buildWhoChoices(p);
    document.getElementById("fav-btn").classList.add("hidden");
    document.getElementById("surprise-btn").classList.add("hidden");
  } else {
    typesEl.innerHTML = p.types.map(t => {
      const tc = getColors(t);
      return `<span class="type-badge" style="background:${tc.bg}">${tc.emoji} ${t}</span>`;
    }).join("");
    factEl.style.display = "block";
    factEl.textContent = `${p.name} ${p.mega
      ? "is a powerful Mega Evolution! 💎"
      : (FUN_FACTS[mainType] || "is an amazing Pokémon!")}`;
    document.getElementById("who-choices").innerHTML = "";
    document.getElementById("fav-btn").classList.remove("hidden");
    document.getElementById("surprise-btn").classList.remove("hidden");
  }

  const isFav = favorites.some(f => f.id === p.id);
  document.getElementById("fav-btn").textContent = isFav ? "❤️" : "🤍";
  document.getElementById("fav-btn").style.transform = isFav ? "scale(1.18)" : "scale(1)";
  document.getElementById("hint").textContent = mode === "silhouette"
    ? "👁️ Who's that Pokémon?" : "Tap 🎲 to discover a new Pokémon!";
}
}

// ── WHO CHOICES ──────────────────────────────────────────────
function buildWhoChoices(p) {
  const wrong = POKEMON.filter(x => x.id !== p.id).sort(()=>Math.random()-0.5).slice(0,3);
  const choices = [...wrong, p].sort(()=>Math.random()-0.5);
  document.getElementById("who-choices").innerHTML = choices.map(c =>
    `<button class="who-choice" onclick="checkWhoGuess('${c.id}',this)">${c.name}</button>`
  ).join("");
}

function checkWhoGuess(id, btn) {
  if (whoAnswered) return;

  if (String(id) === String(current.id)) {
    // CORRECT
    whoAnswered = true;
    btn.classList.add("correct");
    document.querySelectorAll(".who-choice").forEach(b => b.onclick = null);

    // Reveal everything
    document.getElementById("poke-img").style.filter = "drop-shadow(0 8px 28px rgba(0,0,0,0.22))";
    document.getElementById("poke-clue").style.display = "none";
    const nameEl = document.getElementById("poke-name");
    nameEl.textContent = current.name;
    Object.assign(nameEl.style,{color:"#1a1a1a",background:"transparent",borderRadius:"0",padding:"0"});
    document.getElementById("types").innerHTML = current.types.map(t => {
      const tc = getColors(t);
      return `<span class="type-badge" style="background:${tc.bg}">${tc.emoji} ${t}</span>`;
    }).join("");
    document.getElementById("fact-box").style.display = "block";
    document.getElementById("fact-box").textContent =
      `${current.name} ${current.mega ? "is a powerful Mega Evolution! 💎" : (FUN_FACTS[current.types[0]] || "is amazing!")}`;
    document.getElementById("who-result").textContent = "🎉 You got it!";
    document.getElementById("surprise-btn").classList.remove("hidden");
    document.getElementById("fav-btn").classList.remove("hidden");
    soundCorrect(); burst();

  } else {
    // WRONG — dim this button only, keep others active
    btn.classList.add("dimmed");
    btn.onclick = null;
    document.getElementById("who-result").textContent = "Not quite — try again!";
    soundWrong();
  }
}

function randomPokemon() { return POKEMON[Math.floor(Math.random()*POKEMON.length)]; }
function handleSurprise() { soundSurprise(); burst(); renderPokemon(randomPokemon()); }

function toggleMode() {
  mode = mode === "silhouette" ? "explore" : "silhouette";
  soundModeSwitch(mode);
  // Always ensure main is visible and evo is hidden
  document.getElementById("evo-game").style.display = "none";
  document.getElementById("main").style.display = "flex";
  document.getElementById("hint").style.display = "block";
  // Load a fresh Pokémon in whatever mode we just entered
  renderPokemon(randomPokemon());
}

function toggleFav() {
  if (!current) return;
  const idx = favorites.findIndex(f => f.id === current.id);
  if (idx >= 0) favorites.splice(idx,1);
  else { favorites.push(current); burst(); }
  document.getElementById("fav-count").textContent = favorites.length;
  const isFav = favorites.some(f => f.id === current.id);
  document.getElementById("fav-btn").textContent = isFav ? "❤️" : "🤍";
  document.getElementById("fav-btn").style.transform = isFav ? "scale(1.18)" : "scale(1)";
}

// ── EVOLUTION GAME ───────────────────────────────────────────
let evoAnswer = null;
let evoBaseName = "";

function startEvoGame() {
  soundModeSwitch('explore');
  document.getElementById("main").style.display = "none";
  document.getElementById("evo-game").style.display = "flex";
  document.getElementById("hint").textContent = "🥚 Guess the evolution!";
  nextEvoRound();
}

function exitEvoGame() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById("evo-game").style.display = "none";
  document.getElementById("main").style.display = "flex";
  document.getElementById("hint").textContent = mode === "silhouette"
    ? "👁️ Who's that Pokémon?" : "Tap 🎲 to discover a new Pokémon!";
}

function nextEvoRound() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById("evo-result").textContent = "";
  document.getElementById("evo-next-btn").style.display = "none";

  const pool = POKEMON.filter(p => p.evolvesTo !== null);
  const base = pool[Math.floor(Math.random()*pool.length)];
  evoBaseName = base.name;

  let evoId = Array.isArray(base.evolvesTo)
    ? base.evolvesTo[Math.floor(Math.random()*base.evolvesTo.length)]
    : base.evolvesTo;

  evoAnswer = POKEMON_BY_ID[evoId];
  if (!evoAnswer) { nextEvoRound(); return; }

  setBackground(base.types[0]);

  // Tappable name in question
  document.getElementById("evo-question").innerHTML =
    `Who does <span class="spell-name" onclick="spellName('${base.name}')">${base.name}</span> evolve into?`;

  const note = document.getElementById("evo-special-note");
  if (base.specialEvo) { note.textContent = "✨ " + base.specialEvo; note.style.display = "block"; }
  else { note.style.display = "none"; }

  const img = document.getElementById("evo-img");
  img.style.filter = "brightness(0) drop-shadow(0 6px 18px rgba(0,0,0,0.35))";
  img.src = spriteUrl(evoAnswer.id);

  const wrong = POKEMON.filter(p => p.id !== evoAnswer.id).sort(()=>Math.random()-0.5).slice(0,3);
  const choices = [...wrong, evoAnswer].sort(()=>Math.random()-0.5);
  document.getElementById("evo-choices").innerHTML = choices.map(p =>
    `<button class="evo-choice" onclick="checkEvoGuess('${p.id}',this)">${p.name}</button>`
  ).join("");
}

function checkEvoGuess(id, btn) {
  if (String(id) === String(evoAnswer.id)) {
    // CORRECT
    document.querySelectorAll(".evo-choice").forEach(b => b.onclick = null);
    btn.classList.add("correct");
    document.getElementById("evo-img").style.filter = "drop-shadow(0 8px 28px rgba(0,0,0,0.22))";
    document.getElementById("evo-result").textContent = "🎉 That's right!";
    document.getElementById("evo-next-btn").style.display = "block";
    soundCorrect(); burst();
  } else {
    // WRONG — dim only this button
    btn.classList.add("dimmed");
    btn.onclick = null;
    document.getElementById("evo-result").textContent = "Not quite — try again!";
    soundWrong();
  }
}

// ── FAVORITES ────────────────────────────────────────────────
function showFavs() {
  document.getElementById("app").style.display = "none";
  document.getElementById("favs-screen").style.display = "block";
  renderFavs();
}
function hideFavs() {
  document.getElementById("favs-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
}
function renderFavs() {
  const empty = document.getElementById("favs-empty");
  const grid  = document.getElementById("favs-grid");
  if (!favorites.length) { empty.style.display="block"; grid.innerHTML=""; return; }
  empty.style.display = "none";
  grid.innerHTML = favorites.map(p => {
    const c = getColors(p.types[0]);
    return `<div class="fav-card" style="background:${c.light};border-color:${c.bg}">
      <img src="${spriteUrl(p.id)}" alt="${p.name}">
      <div class="fav-name">${p.name}</div>
      <div class="fav-num" style="color:${c.bg}">${typeof p.id==="number"?"#"+String(p.id).padStart(3,"0"):"⚡ MEGA"}</div>
      <div style="margin-top:6px">${p.types.map(t=>{const tc=getColors(t);return`<span class="type-badge" style="background:${tc.bg};font-size:0.72rem;padding:3px 10px">${tc.emoji} ${t}</span>`}).join("")}</div>
    </div>`;
  }).join("");
}

// ── CONFETTI ─────────────────────────────────────────────────
function burst() {
  const el = document.getElementById("confetti");
  el.innerHTML=""; el.style.display="block";
  const cols=["#FF6B35","#4A90D9","#F7C948","#5DBB63","#E040A0","#A890F0","#74CCF4"];
  for(let i=0;i<26;i++){
    const p=document.createElement("div"); p.className="piece";
    p.style.left=`${(i/26)*100}%`;
    p.style.background=cols[i%cols.length];
    p.style.borderRadius=i%3===0?"50%":"2px";
    p.style.animationDuration=`${1.1+(i%5)*0.22}s`;
    p.style.animationDelay=`${(i%6)*0.06}s`;
    p.style.transform=`rotate(${i*23}deg)`;
    el.appendChild(p);
  }
  setTimeout(()=>{el.style.display="none";el.innerHTML="";},2500);
}

// ── SPLASH / START ───────────────────────────────────────────
function startGame() {
  soundStart();
  preloadClips();
  mode = "silhouette";  // always start in guess mode
  const splash = document.getElementById("splash");
  splash.style.opacity = "0";
  setTimeout(() => { splash.style.display = "none"; }, 600);
  renderPokemon(randomPokemon());
}
</script>
