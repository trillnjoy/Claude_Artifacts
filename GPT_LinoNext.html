<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linocut Predictor (Pair-Based)</title>
<style>
  body { background:#111; color:#eee; font-family:sans-serif; text-align:center; }
  canvas { margin:10px; border:1px solid #444; max-width:90vw; }
  .controls { margin:10px; }
</style>
</head>
<body>

<h2>Linocut Predictor (Last Print + Current Plate)</h2>

<input type="file" id="printInput" accept="image/*">
<input type="file" id="plateInput" accept="image/*">

<div class="controls">
  <label>Carve Sensitivity
    <input type="range" id="carve" min="0" max="255" value="140">
  </label>
  <label>Ink Spread
    <input type="range" id="spread" min="0" max="3" step="0.1" value="1">
  </label>
</div>

<canvas id="canvas"></canvas>

<script>
const printInput = document.getElementById('printInput');
const plateInput = document.getElementById('plateInput');
const carveSlider = document.getElementById('carve');
const spreadSlider = document.getElementById('spread');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let printImgData = null;
let plateImgData = null;

function loadImage(file, cb) {
  const img = new Image();
  img.onload = () => cb(img);
  img.src = URL.createObjectURL(file);
}

printInput.onchange = e => {
  loadImage(e.target.files[0], img => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    printImgData = ctx.getImageData(0, 0, img.width, img.height);
    process();
  });
};

plateInput.onchange = e => {
  loadImage(e.target.files[0], img => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    plateImgData = ctx.getImageData(0, 0, img.width, img.height);
    process();
  });
};

carveSlider.oninput = process;
spreadSlider.oninput = process;

function toGray(data) {
  let out = new Uint8ClampedArray(data.length);
  for (let i = 0; i < data.length; i += 4) {
    let g = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    out[i] = out[i+1] = out[i+2] = g;
    out[i+3] = 255;
  }
  return out;
}

function blur(data, w, h, r) {
  let out = new Uint8ClampedArray(data);
  r = Math.floor(r);
  if (r < 1) return data;

  for (let y=r; y<h-r; y++) {
    for (let x=r; x<w-r; x++) {
      let sum=0,count=0;
      for (let dy=-r; dy<=r; dy++) {
        for (let dx=-r; dx<=r; dx++) {
          let i=((y+dy)*w+(x+dx))*4;
          sum+=data[i];
          count++;
        }
      }
      let val=sum/count;
      let i=(y*w+x)*4;
      out[i]=out[i+1]=out[i+2]=val;
    }
  }
  return out;
}

function process() {
  if (!printImgData || !plateImgData) return;

  const carveT = parseInt(carveSlider.value);
  const spread = parseFloat(spreadSlider.value);

  const w = printImgData.width;
  const h = printImgData.height;

  let printGray = toGray(printImgData.data);
  let plateGray = toGray(plateImgData.data);

  let out = new Uint8ClampedArray(printGray.length);

  for (let i = 0; i < printGray.length; i += 4) {

    let printVal = printGray[i];   // what printed before
    let plateVal = plateGray[i];   // current carve brightness

    // detect newly carved (lighter on plate)
    let carvedNow = plateVal > carveT;

    let val;

    if (carvedNow) {
      // remove ink (becomes paper)
      val = 255;
    } else {
      // keep previous print value
      val = printVal;
    }

    out[i]=out[i+1]=out[i+2]=val;
    out[i+3]=255;
  }

  // simulate ink spread slightly
  out = blur(out, w, h, spread);

  ctx.putImageData(new ImageData(out, w, h), 0, 0);
}
</script>

</body>
</html>
