<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Linocut Predictor v2.1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  body {

    margin:0;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background:#0f0f10;

    color:#eaeaea;

    text-align:center;

  }

  h2 { margin:16px 0 8px; }

  input { margin:10px; }

  .controls {

    margin:10px;

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

  }

  label {

    font-size:14px;

  }

  canvas {

    margin:10px;

    max-width:90vw;

    border:1px solid #333;

  }

</style>

</head>

<body>

<h2>Linocut Predictor v2.1</h2>

<input type="file" id="input" accept="image/*">

<div class="controls">

  <label>Ink Spread

    <input type="range" id="spread" min="0" max="3" step="0.1" value="1">

  </label>

  <label>Ink Strength

    <input type="range" id="ink" min="0" max="2" step="0.1" value="1">

  </label>

</div>

<canvas id="canvas"></canvas>

<script>

const input = document.getElementById('input');

const spreadSlider = document.getElementById('spread');

const inkSlider = document.getElementById('ink');

const canvas = document.getElementById('canvas');

const ctx = canvas.getContext('2d');

let baseImage = null;

input.onchange = e => {

  const img = new Image();

  img.onload = () => {

    canvas.width = img.width;

    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    baseImage = ctx.getImageData(0, 0, img.width, img.height);

    process();

  };

  img.src = URL.createObjectURL(e.target.files[0]);

};

spreadSlider.oninput = process;

inkSlider.oninput = process;

// --- EDGE DETECTION

function edgeMap(data, width, height) {

  let edges = new Float32Array(width * height);

  for (let y = 1; y < height - 1; y++) {

    for (let x = 1; x < width - 1; x++) {

      let i = (y * width + x) * 4;

      let gx = data[i+4] - data[i-4];

      let gy = data[i + width*4] - data[i - width*4];

      let mag = Math.sqrt(gx*gx + gy*gy);

      edges[y * width + x] = mag;

    }

  }

  return edges;

}

// --- LOCAL THRESHOLD

function localThreshold(data, width, height, radius=6) {

  let out = new Uint8ClampedArray(data.length);

  for (let y = 0; y < height; y++) {

    for (let x = 0; x < width; x++) {

      let sum = 0, count = 0;

      for (let dy = -radius; dy <= radius; dy++) {

        for (let dx = -radius; dx <= radius; dx++) {

          let nx = x + dx;

          let ny = y + dy;

          if (nx>=0 && ny>=0 && nx<width && ny<height) {

            let ni = (ny * width + nx) * 4;

            sum += data[ni];

            count++;

          }

        }

      }

      let i = (y * width + x) * 4;

      let threshold = sum / count;

      let carved = data[i] > threshold;

      let val = carved ? 255 : 0;

      out[i] = out[i+1] = out[i+2] = val;

      out[i+3] = 255;

    }

  }

  return out;

}

// --- EDGE-AWARE BLUR

function edgeAwareBlur(data, edges, width, height, amount) {

  let out = new Uint8ClampedArray(data);

  for (let y = 1; y < height - 1; y++) {

    for (let x = 1; x < width - 1; x++) {

      let i = (y * width + x) * 4;

      let edgeStrength = edges[y * width + x];

      let localAmount = amount * (1 - Math.min(edgeStrength / 60, 1));

      if (localAmount < 0.1) continue;

      let total = 0, count = 0;

      let radius = Math.floor(localAmount);

      for (let dy = -radius; dy <= radius; dy++) {

        for (let dx = -radius; dx <= radius; dx++) {

          let ni = ((y+dy) * width + (x+dx)) * 4;

          total += data[ni];

          count++;

        }

      }

      let val = total / count;

      out[i] = out[i+1] = out[i+2] = val;

    }

  }

  return out;

}

function process() {

  if (!baseImage) return;

  const spread = parseFloat(spreadSlider.value);

  const ink = parseFloat(inkSlider.value);

  let data = new Uint8ClampedArray(baseImage.data);

  const width = baseImage.width;

  const height = baseImage.height;

  // --- GRAYSCALE

  for (let i = 0; i < data.length; i += 4) {

    let g = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];

    data[i] = data[i+1] = data[i+2] = g;

  }

  // --- EDGE MAP

  const edges = edgeMap(data, width, height);

  // --- LOCAL THRESHOLD

  data = localThreshold(data, width, height);

  // --- EDGE-AWARE SPREAD

  if (spread > 0) {

    data = edgeAwareBlur(data, edges, width, height, spread);

  }

  // --- INK SIMULATION

  for (let i = 0; i < data.length; i += 4) {

    let val = 255 - data[i] * ink;

    val = Math.max(0, Math.min(255, val));

    data[i] = data[i+1] = data[i+2] = val;

  }

  ctx.putImageData(new ImageData(data, width, height), 0, 0);

}

</script>

</body>

</html>
