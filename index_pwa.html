<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Poetry">
<meta name="theme-color" content="#faf9f7">
<title>Poetry Archive</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');
  :root{--ink:#1a1a1a;--ink-light:#555;--ink-faint:#999;--paper:#faf9f7;--paper-warm:#f3f1ed;--rule:#ddd8d0;--accent:#8b3a3a;--tag-bg:#ede9e3;--tag-text:#555}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:'Source Sans 3',sans-serif;font-weight:300;min-height:100vh}
  header{padding:1.25rem 1.25rem 0;background:var(--paper);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--rule)}
  .header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.85rem}
  header h1{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase}
  .header-count{font-size:.75rem;color:var(--ink-faint)}
  .search-row{margin-bottom:.75rem}
  #search{width:100%;border:1px solid var(--rule);border-radius:2px;padding:.45rem .65rem;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:300;background:white;color:var(--ink);outline:none;-webkit-appearance:none}
  #search:focus{border-color:var(--accent)}
  .filters{display:flex;flex-wrap:wrap;gap:.3rem;padding-bottom:.75rem}
  .filter-pill{font-size:.68rem;letter-spacing:.04em;padding:.2rem .55rem;border-radius:2px;border:1px solid var(--rule);background:white;color:var(--ink-light);cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
  .filter-pill.active{background:var(--accent);color:white;border-color:var(--accent)}
  .filter-pill.clear-pill{border-color:transparent;color:var(--accent);background:transparent;font-weight:600}
  table{width:100%;border-collapse:collapse}
  thead tr{border-bottom:2px solid var(--rule);background:var(--paper-warm)}
  th{font-family:'Source Sans 3',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);padding:.55rem .75rem;text-align:left;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;white-space:nowrap}
  th:first-child{padding-left:1.25rem}th:last-child{padding-right:1.25rem}
  th .sa{display:inline-block;margin-left:.3em;opacity:.3;font-size:.62rem}
  th.sort-active{color:var(--accent)}th.sort-active .sa{opacity:1}
  tbody tr{border-bottom:1px solid var(--rule);cursor:pointer;-webkit-tap-highlight-color:transparent}
  tbody tr:active{background:var(--paper-warm)}
  td{padding:.75rem;vertical-align:top}
  td:first-child{padding-left:1.25rem}td:last-child{padding-right:1.25rem}
  .cp{width:42%}.cp-name{font-size:.88rem;color:var(--ink);font-weight:400;line-height:1.4}
  .cp-dates{font-size:.73rem;color:var(--ink-faint);font-style:italic;margin-top:.1rem}
  .ct{width:58%}.ct-name{font-family:'Libre Baskerville',serif;font-size:.9rem;font-weight:400;color:var(--ink);line-height:1.4}
  .ct-tags{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.35rem}
  .tag{font-family:'Source Sans 3',sans-serif;font-size:.62rem;letter-spacing:.03em;padding:.12rem .4rem;border-radius:2px;background:var(--tag-bg);color:var(--tag-text)}
  .empty-row td{padding:2.5rem 1.25rem;text-align:center;color:var(--ink-faint);font-size:.88rem;cursor:default}
  #poem-view{display:none;min-height:100vh}
  .pvh{padding:1rem 1.25rem .85rem;border-bottom:1px solid var(--rule);display:flex;align-items:flex-start;gap:.85rem;position:sticky;top:0;background:var(--paper);z-index:100}
  .back-btn{font-size:1.5rem;color:var(--accent);background:none;border:none;cursor:pointer;padding:0 .2rem;-webkit-tap-highlight-color:transparent;line-height:1.2;flex-shrink:0}
  .pvm{flex:1}.pv-title{font-family:'Libre Baskerville',serif;font-size:1.05rem;font-weight:400;line-height:1.35}
  .pv-poet{font-size:.83rem;color:var(--ink-light);margin-top:.2rem}
  .pv-dates{font-size:.75rem;color:var(--ink-faint);font-style:italic}
  .pv-tags{padding:.75rem 1.25rem 0;display:flex;flex-wrap:wrap;gap:.28rem}
  .poem-body{padding:1.75rem 1.75rem 4rem;max-width:520px}
  .poem-body .stanza{margin-bottom:1.5em}
  .poem-body p{font-family:'Libre Baskerville',serif;font-size:.96rem;line-height:1.78;color:var(--ink)}
  .poem-body em{font-style:italic}
  .add-btn{position:fixed;bottom:1.5rem;right:1.25rem;width:3rem;height:3rem;border-radius:50%;background:var(--accent);color:white;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;z-index:200;line-height:1}
  .mode-menu{position:fixed;bottom:5.2rem;right:1.25rem;z-index:201;display:none;flex-direction:column;gap:.5rem;align-items:flex-end}
  .mode-menu.open{display:flex}
  .mode-btn{display:flex;align-items:center;gap:.6rem;background:var(--paper);border:1px solid var(--rule);border-radius:24px;padding:.55rem 1rem .55rem .8rem;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:400;color:var(--ink);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);-webkit-tap-highlight-color:transparent;white-space:nowrap}
  .menu-scrim{position:fixed;inset:0;z-index:200;display:none}
  .menu-scrim.open{display:block}
  .sheet{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:flex-end}
  .sheet.open{display:flex}
  .sheet-inner{background:var(--paper);width:100%;border-radius:12px 12px 0 0;padding:1.5rem 1.25rem;max-height:92vh;overflow-y:auto}
  .sheet-inner h2{font-family:'Libre Baskerville',serif;font-size:.95rem;font-weight:400;margin-bottom:1.1rem}
  .fg{margin-bottom:.85rem}
  .fg label{display:block;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:.25rem}
  .fg input,.fg textarea{width:100%;border:1px solid var(--rule);border-radius:2px;padding:.45rem .6rem;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:300;background:white;color:var(--ink);outline:none;-webkit-appearance:none}
  .fg input:focus,.fg textarea:focus{border-color:var(--accent)}
  .fg textarea{min-height:110px;resize:vertical;font-family:'Libre Baskerville',serif;font-size:.86rem;line-height:1.65}
  .sheet-actions{display:flex;gap:.65rem;margin-top:1.1rem}
  .btn-p{flex:1;background:var(--accent);color:white;border:none;border-radius:2px;padding:.65rem;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer}
  .btn-s{flex:1;background:none;color:var(--ink-light);border:1px solid var(--rule);border-radius:2px;padding:.65rem;font-family:'Source Sans 3',sans-serif;font-size:.88rem;cursor:pointer}
  .capture-zone{border:1.5px dashed var(--rule);border-radius:4px;padding:2rem 1rem;text-align:center;cursor:pointer;margin-bottom:1rem;-webkit-tap-highlight-color:transparent}
  .capture-zone .cz-icon{font-size:2rem;margin-bottom:.4rem}
  .capture-zone .cz-label{font-size:.85rem;color:var(--ink-light)}
  #capture-file{display:none}
  .capture-preview{width:100%;border-radius:4px;margin-bottom:1rem;display:none;max-height:200px;object-fit:contain}
  .ocr-status{font-size:.8rem;color:var(--ink-faint);text-align:center;padding:.5rem 0;min-height:1.5rem}
  .ocr-status.working{color:var(--accent)}
  .ocr-status.done{color:#4a7c4a}
  .ocr-status.error{color:#c0392b}
  .settings-btn{position:fixed;bottom:1.5rem;left:1.25rem;width:3rem;height:3rem;border-radius:50%;background:white;border:1px solid var(--rule);color:var(--ink-faint);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .key-status{width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block;margin-right:.4rem}
  .key-status.set{background:#4a7c4a}
  #loading{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:500;font-size:.88rem;color:var(--ink-faint);font-family:'Source Sans 3',sans-serif}
</style>
</head>
<body>

<div id="loading">Loading archive…</div>

<div id="list-view" style="display:none">
  <header id="main-header">
    <div class="header-top">
      <h1>Poetry Archive</h1>
      <span class="header-count" id="header-count"></span>
    </div>
    <div class="search-row">
      <input id="search" type="search" placeholder="Search poet, title, or tag…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="filters" id="tag-filters"></div>
  </header>
  <table>
    <thead>
      <tr>
        <th data-col="poet" class="sort-active">Poet <span class="sa">▲</span></th>
        <th data-col="title">Title <span class="sa">▲</span></th>
      </tr>
    </thead>
    <tbody id="browse-body"></tbody>
  </table>
</div>

<div id="poem-view">
  <div class="pvh">
    <button class="back-btn" id="back-btn">‹</button>
    <div class="pvm">
      <div class="pv-title" id="view-title"></div>
      <div class="pv-poet" id="view-poet"></div>
      <div class="pv-dates" id="view-dates"></div>
    </div>
  </div>
  <div class="pv-tags" id="view-tags"></div>
  <div class="poem-body" id="view-body"></div>
</div>

<button class="settings-btn" id="settings-btn" title="Settings">⚙︎</button>
<div class="menu-scrim" id="menu-scrim"></div>
<div class="mode-menu" id="mode-menu">
  <button class="mode-btn" id="btn-capture"><span class="icon">📷</span> Capture photo</button>
  <button class="mode-btn" id="btn-manual"><span class="icon">✎</span> Enter manually</button>
</div>
<button class="add-btn" id="add-btn">+</button>

<div class="sheet" id="capture-sheet">
  <div class="sheet-inner">
    <h2>Capture Poem</h2>
    <div class="capture-zone" id="capture-zone">
      <div class="cz-icon">📷</div>
      <div class="cz-label">Tap to take photo or choose from library</div>
    </div>
    <input type="file" id="capture-file" accept="image/*" capture="environment">
    <img class="capture-preview" id="capture-preview">
    <div class="ocr-status" id="ocr-status"></div>
    <div id="capture-form" style="display:none">
      <div class="fg"><label>Poet</label><input id="cap-poet" type="text"></div>
      <div class="fg"><label>Title</label><input id="cap-title" type="text"></div>
      <div class="fg"><label>Dates (optional)</label><input id="cap-dates" type="text"></div>
      <div class="fg"><label>Tags (comma-separated)</label><input id="cap-tags" type="text"></div>
      <div class="fg"><label>Poem text (review only)</label><textarea id="cap-text"></textarea></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-s" id="cap-cancel">Cancel</button>
      <button class="btn-p" id="cap-save" style="display:none">Save Poem</button>
    </div>
  </div>
</div>

<div class="sheet" id="manual-sheet">
  <div class="sheet-inner">
    <h2>Add Poem</h2>
    <div class="fg"><label>Poet</label><input id="new-poet" type="text"></div>
    <div class="fg"><label>Title</label><input id="new-title" type="text"></div>
    <div class="fg"><label>Dates (optional)</label><input id="new-dates" type="text"></div>
    <div class="fg"><label>Tags (comma-separated)</label><input id="new-tags" type="text"></div>
    <div class="fg"><label>Poem text</label><textarea id="new-text" placeholder="Blank lines = stanza breaks."></textarea></div>
    <div class="sheet-actions">
      <button class="btn-s" id="cancel-manual">Cancel</button>
      <button class="btn-p" id="save-manual">Save Poem</button>
    </div>
  </div>
</div>

<div class="sheet" id="settings-sheet">
  <div class="sheet-inner">
    <h2>Settings</h2>
    <div class="fg">
      <label><span class="key-status" id="key-status"></span>Anthropic API Key</label>
      <input id="api-key-input" type="password" placeholder="sk-ant-…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <p style="font-size:.75rem;color:var(--ink-faint);margin-top:-.4rem;margin-bottom:.85rem">Stored on this device only. Required for photo capture.</p>
    <div class="fg">
      <label>Archive</label>
      <div id="db-info" style="font-size:.8rem;color:var(--ink-faint);padding:.3rem 0"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-s" id="cancel-settings">Cancel</button>
      <button class="btn-p" id="save-settings">Save</button>
    </div>
  </div>
</div>

<script>
// ── IndexedDB ──────────────────────────────────────────────────────────────
const DB_NAME = 'poetry-archive', DB_VER = 1, STORE = 'poems';
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e.target.error);
  });
}

const tx = (mode) => db.transaction(STORE, mode).objectStore(STORE);

function dbGetAll() {
  return new Promise((res, rej) => {
    const req = tx('readonly').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbPut(poem) {
  return new Promise((res, rej) => {
    const req = tx('readwrite').put(poem);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

function dbCount() {
  return new Promise((res, rej) => {
    const req = tx('readonly').count();
    req.onsuccess = () => res(req.result);
    req.onerror = e => rej(e.target.error);
  });
}

// ── Seed ───────────────────────────────────────────────────────────────────
async function seedIfEmpty() {
  const count = await dbCount();
  if (count > 0) return;
  try {
    const resp = await fetch('poems_seed.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const poems = await resp.json();
    for (const p of poems) await dbPut(p);
    console.log(`Seeded ${poems.length} poems into IndexedDB`);
  } catch(e) {
    console.warn('Seed load failed:', e.message);
  }
}

// ── State ──────────────────────────────────────────────────────────────────
let allPoems = [], sortCol = 'poet', sortDir = 1, activeTag = null, query = '';

function surname(n) { const p = n.trim().split(/\s+/); return p[p.length-1].toLowerCase(); }

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  let poems = [...allPoems];
  if (activeTag) poems = poems.filter(p => (p.tags||[]).includes(activeTag));
  if (query) {
    const q = query.toLowerCase();
    poems = poems.filter(p =>
      p.poet.toLowerCase().includes(q) ||
      p.title.toLowerCase().includes(q) ||
      (p.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  poems.sort((a,b) => {
    const av = sortCol==='poet' ? surname(a.poet) : a.title.toLowerCase();
    const bv = sortCol==='poet' ? surname(b.poet) : b.title.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  const tbody = document.getElementById('browse-body');
  tbody.innerHTML = poems.length
    ? poems.map(p => `<tr data-id="${p.id}">
        <td class="cp"><div class="cp-name">${p.poet}</div>${p.dates?`<div class="cp-dates">${p.dates}</div>`:''}</td>
        <td class="ct"><div class="ct-name">${p.title}</div><div class="ct-tags">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></td>
      </tr>`).join('')
    : '<tr class="empty-row"><td colspan="2">No poems found</td></tr>';
  document.getElementById('header-count').textContent = `${poems.length} poem${poems.length!==1?'s':''}`;
  renderTags();
  tbody.querySelectorAll('tr[data-id]').forEach(r => r.addEventListener('click', () => openPoem(r.dataset.id)));
}

function renderTags() {
  const counts = {};
  allPoems.forEach(p => (p.tags||[]).forEach(t => counts[t]=(counts[t]||0)+1));
  const tags = Object.keys(counts).sort();
  const el = document.getElementById('tag-filters');
  el.innerHTML = (activeTag?`<button class="filter-pill clear-pill">✕ Clear</button>`:'')+
    tags.map(t=>`<button class="filter-pill${activeTag===t?' active':''}" data-tag="${t}">${t}</button>`).join('');
  el.querySelectorAll('[data-tag]').forEach(b => b.addEventListener('click', () => { activeTag = activeTag===b.dataset.tag?null:b.dataset.tag; render(); }));
  const clr = el.querySelector('.clear-pill');
  if (clr) clr.addEventListener('click', () => { activeTag=null; render(); });
}

async function reload() { allPoems = await dbGetAll(); render(); }

// ── Poem view ──────────────────────────────────────────────────────────────
function openPoem(id) {
  const p = allPoems.find(x => x.id===id); if (!p) return;
  document.getElementById('view-title').textContent = p.title;
  document.getElementById('view-poet').textContent = p.poet;
  document.getElementById('view-dates').textContent = p.dates||'';
  document.getElementById('view-tags').innerHTML = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('view-body').innerHTML = p.text||'';
  document.getElementById('list-view').style.display='none';
  document.getElementById('poem-view').style.display='block';
  window.scrollTo(0,0);
}
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('poem-view').style.display='none';
  document.getElementById('list-view').style.display='';
});

// ── Sort / search ──────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', () => {
  if (sortCol===th.dataset.col) sortDir*=-1; else { sortCol=th.dataset.col; sortDir=1; }
  document.querySelectorAll('th[data-col]').forEach(t => {
    t.classList.toggle('sort-active', t.dataset.col===sortCol);
    t.querySelector('.sa').textContent = t.dataset.col===sortCol?(sortDir===1?'▲':'▼'):'▲';
    t.querySelector('.sa').style.opacity = t.dataset.col===sortCol?'1':'.3';
  });
  render();
}));
document.getElementById('search').addEventListener('input', e => { query=e.target.value; render(); });

// ── Menu / sheets ──────────────────────────────────────────────────────────
const addBtn=document.getElementById('add-btn'), modeMenu=document.getElementById('mode-menu'), menuScrim=document.getElementById('menu-scrim');
const closeMenu=()=>{ modeMenu.classList.remove('open'); menuScrim.classList.remove('open'); };
addBtn.addEventListener('click', ()=>{ modeMenu.classList.toggle('open'); menuScrim.classList.toggle('open'); });
menuScrim.addEventListener('click', closeMenu);
const openSheet=id=>document.getElementById(id).classList.add('open');
const closeSheet=id=>document.getElementById(id).classList.remove('open');

// ── Manual entry ───────────────────────────────────────────────────────────
document.getElementById('btn-manual').addEventListener('click', ()=>{ closeMenu(); openSheet('manual-sheet'); });
document.getElementById('cancel-manual').addEventListener('click', ()=>closeSheet('manual-sheet'));
document.getElementById('save-manual').addEventListener('click', async ()=>{
  const poet=document.getElementById('new-poet').value.trim();
  const title=document.getElementById('new-title').value.trim();
  if (!poet||!title) return alert('Poet and title required.');
  const raw=document.getElementById('new-text').value;
  const tags=document.getElementById('new-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const html=raw.split(/\n\n+/).map(s=>`<div class='stanza'>${s.split('\n').map(l=>`<p>${l}</p>`).join('')}</div>`).join('');
  await dbPut({ id:`${poet.toLowerCase().replace(/\s+/g,'-')}-${Date.now()}`, title, poet,
    dates:document.getElementById('new-dates').value.trim(), tags,
    added:new Date().toISOString().slice(0,10), text:html });
  closeSheet('manual-sheet');
  ['new-poet','new-title','new-dates','new-tags','new-text'].forEach(id=>document.getElementById(id).value='');
  await reload();
});

// ── Capture ────────────────────────────────────────────────────────────────
document.getElementById('btn-capture').addEventListener('click', ()=>{ closeMenu(); openSheet('capture-sheet'); });
const resetCapture = () => {
  document.getElementById('capture-file').value='';
  document.getElementById('capture-preview').style.display='none';
  document.getElementById('capture-form').style.display='none';
  document.getElementById('cap-save').style.display='none';
  document.getElementById('ocr-status').textContent='';
  document.getElementById('ocr-status').className='ocr-status';
};
document.getElementById('cap-cancel').addEventListener('click', ()=>{ resetCapture(); closeSheet('capture-sheet'); });
document.getElementById('capture-zone').addEventListener('click', ()=>document.getElementById('capture-file').click());

document.getElementById('capture-file').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const preview = document.getElementById('capture-preview');
  preview.src = URL.createObjectURL(file); preview.style.display='block';
  const status = document.getElementById('ocr-status');
  const apiKey = localStorage.getItem('pa_api_key')||'';
  if (!apiKey) {
    status.textContent='No API key — enter fields manually.'; status.className='ocr-status error';
    document.getElementById('capture-form').style.display='block';
    document.getElementById('cap-save').style.display='block'; return;
  }
  status.textContent='Reading poem…'; status.className='ocr-status working';
  try {
    const b64 = await new Promise((res,rej)=>{
      const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file);
    });
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001', max_tokens:2000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
          {type:'text',text:'Extract the poem from this image. Return JSON only, no markdown fences: {"title":"...","poet":"...","dates":"...","tags":[...],"text":"..."} where text uses \\n for line breaks and \\n\\n for stanza breaks. Preserve any indentation with leading spaces. Tags from: longing grief joy desire tenderness melancholy defiance wonder resignation mortality nature time war faith identity embodiment beauty memory sonnet ode lyric free-verse rhymed classical translation ancient renaissance romantic-era victorian modernist contemporary erotic conjugal romantic.'}
        ]}]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const parsed = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    // Store structured text for HTML conversion at save time
    document.getElementById('cap-poet').value = parsed.poet||'';
    document.getElementById('cap-title').value = parsed.title||'';
    document.getElementById('cap-dates').value = parsed.dates||'';
    document.getElementById('cap-tags').value = (parsed.tags||[]).join(', ');
    document.getElementById('cap-text').value = parsed.text||'';
    document.getElementById('capture-form').style.display='block';
    document.getElementById('cap-save').style.display='block';
    status.textContent='Done — review and save.'; status.className='ocr-status done';
  } catch(err) {
    status.textContent=`${err.message||'Could not read — fill in manually.'}`;
    status.className='ocr-status error';
    document.getElementById('capture-form').style.display='block';
    document.getElementById('cap-save').style.display='block';
  }
});

document.getElementById('cap-save').addEventListener('click', async ()=>{
  const poet=document.getElementById('cap-poet').value.trim();
  const title=document.getElementById('cap-title').value.trim();
  if (!poet||!title) return alert('Poet and title required.');
  const raw=document.getElementById('cap-text').value;
  const tags=document.getElementById('cap-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  // Convert \n-delimited text with optional leading spaces to HTML
  const html = raw.split(/\n\n+/).map(s => {
    return `<div class='stanza'>${s.split('\n').map(l => {
      const m = l.match(/^(\s+)(.*)/);
      return m ? `<p><span style="padding-left:${m[1].length*0.5}em">${m[2]}</span></p>` : `<p>${l}</p>`;
    }).join('')}</div>`;
  }).join('');
  await dbPut({ id:`${poet.toLowerCase().replace(/\s+/g,'-')}-${Date.now()}`, title, poet,
    dates:document.getElementById('cap-dates').value.trim(), tags,
    added:new Date().toISOString().slice(0,10), text:html });
  resetCapture();
  closeSheet('capture-sheet');
  await reload();
});

// ── Settings ───────────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click', async ()=>{
  const k=localStorage.getItem('pa_api_key')||'';
  document.getElementById('api-key-input').value=k;
  document.getElementById('key-status').className='key-status'+(k?' set':'');
  const n=await dbCount();
  document.getElementById('db-info').textContent=`${n} poems in IndexedDB`;
  openSheet('settings-sheet');
});
document.getElementById('cancel-settings').addEventListener('click', ()=>closeSheet('settings-sheet'));
document.getElementById('save-settings').addEventListener('click', ()=>{
  const k=document.getElementById('api-key-input').value.trim();
  if (k) localStorage.setItem('pa_api_key',k); else localStorage.removeItem('pa_api_key');
  document.getElementById('key-status').className='key-status'+(k?' set':'');
  closeSheet('settings-sheet');
});

// ── Service worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW failed:',e));
}

// ── Init ───────────────────────────────────────────────────────────────────
(async ()=>{
  await openDB();
  await seedIfEmpty();
  allPoems = await dbGetAll();
  document.getElementById('loading').style.display='none';
  document.getElementById('list-view').style.display='';
  render();
})();
</script>
</body>
</html>
