function PediatricBPCalculator() {
  const [age, setAge] = useState(10);
  const [sex, setSex] = useState('Male');
  const [height, setHeight] = useState('');
  const [unit, setUnit] = useState('cm');
  const [result, setResult] = useState(null);
  const [showInstructions, setShowInstructions] = useState(false);
  const [showReferences, setShowReferences] = useState(false);

  const cmToInches = (cm) => cm / 2.54;
  const inchesToCm = (inches) => inches * 2.54;

  const getHeightInCm = () => {
    const h = parseFloat(height);
    if (isNaN(h) || h <= 0) return null;
    return unit === 'in' ? inchesToCm(h) : h;
  };

  const findBPValues = () => {
    const ageNum = parseInt(age);
    const heightCm = getHeightInCm();
    const sexStr = sex.toLowerCase();

    if (!ageNum || !heightCm || !sexStr || ageNum < 1 || ageNum > 25 || heightCm <= 0) {
      return null;
    }

    // For ages 13+, use adult thresholds (Table 3)
    if (ageNum >= 13) {
      return {
        useAdult: true,
        age: ageNum,
        sex: sexStr,
        height: heightCm,
        values: {
          '50th Percentile': { sbp: 110, dbp: 70, classification: 'Normal (<120/<80)' },
          '90th Percentile': { sbp: ADULT_THRESHOLDS.elevated.sbp, dbp: ADULT_THRESHOLDS.elevated.dbp, classification: 'Elevated BP' },
          '95th Percentile': { sbp: ADULT_THRESHOLDS.stage1.sbp, dbp: ADULT_THRESHOLDS.stage1.dbp, classification: 'Stage 1 HTN' },
          '95th Percentile + 12 mmHg': { sbp: ADULT_THRESHOLDS.stage2.sbp, dbp: ADULT_THRESHOLDS.stage2.dbp, classification: 'Stage 2 HTN' }
        }
      };
    }

    // For ages 1-12, use pediatric tables
    const table = sexStr === 'male' ? BOYS_BP_TABLE : GIRLS_BP_TABLE;
    const ageData = table[ageNum];
    
    if (!ageData) {
      return null;
    }

    // Find the greatest height that the patient's height has exceeded
    const heights = ageData.heights;
    let heightIndex = 0;
    for (let i = 0; i < heights.length; i++) {
      if (heightCm >= heights[i]) {
        heightIndex = i;
      }
    }

    // Get BP values for this height
    const percentiles = ageData.percentiles;
    const sbp50 = percentiles[50].sbp[heightIndex];
    const dbp50 = percentiles[50].dbp[heightIndex];
    const sbp90 = percentiles[90].sbp[heightIndex];
    const dbp90 = percentiles[90].dbp[heightIndex];
    const sbp95 = percentiles[95].sbp[heightIndex];
    const dbp95 = percentiles[95].dbp[heightIndex];
    const sbp95plus12 = percentiles['95+12'].sbp[heightIndex];
    const dbp95plus12 = percentiles['95+12'].dbp[heightIndex];

    // Apply the logic: use lesser of pediatric value or adult threshold for ages 1-12
    const get50thValues = () => {
      return { sbp: sbp50, dbp: dbp50 };
    };

    const get90thValues = () => {
      // Elevated BP threshold: use lesser of 90th percentile or 120/80
      const sbp = Math.min(sbp90, ADULT_THRESHOLDS.elevated.sbp);
      const dbp = Math.min(dbp90, ADULT_THRESHOLDS.elevated.dbp);
      return { sbp, dbp };
    };

    const get95thValues = () => {
      // Stage 1 HTN: use lesser of 95th percentile or 130/80
      const sbp = Math.min(sbp95, ADULT_THRESHOLDS.stage1.sbp);
      const dbp = Math.min(dbp95, ADULT_THRESHOLDS.stage1.dbp);
      return { sbp, dbp };
    };

    const get95plus12Values = () => {
      // Stage 2 HTN: use lesser of 95th+12 or 140/90
      const sbp = Math.min(sbp95plus12, ADULT_THRESHOLDS.stage2.sbp);
      const dbp = Math.min(dbp95plus12, ADULT_THRESHOLDS.stage2.dbp);
      return { sbp, dbp };
    };

    const v50 = get50thValues();
    const v90 = get90thValues();
    const v95 = get95thValues();
    const v95p12 = get95plus12Values();

    return {
      useAdult: false,
      age: ageNum,
      sex: sexStr,
      height: heightCm,
      values: {
        '50th Percentile': { ...v50, classification: 'Normal' },
        '90th Percentile': { ...v90, classification: 'Elevated BP' },
        '95th Percentile': { ...v95, classification: 'Stage 1 HTN' },
        '95th Percentile + 12 mmHg': { ...v95p12, classification: 'Stage 2 HTN' }
      }
    };
  };

  // Dynamic calculation whenever inputs change
  useEffect(() => {
    const newResult = findBPValues();
    setResult(newResult);
  }, [age, sex, height, unit]);

  const handleReset = () => {
    setAge(10);
    setSex('Male');
    setHeight('');
    setUnit('cm');
    setResult(null);
  };

  const formatHeight = (heightCm) => {
    if (unit === 'in') {
      return `${cmToInches(heightCm).toFixed(1)} in`;
    }
    return `${heightCm.toFixed(1)} cm`;
  };

  return (
    <div style={{ 
      minHeight: '100vh',
      backgroundColor: COLORS.background,
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif'
    }}>

      <div style={{
        background: `linear-gradient(135deg, ${COLORS.primary} 0%, ${COLORS.teal} 100%)`,

        boxShadow: '0 2px 8px rgba(0,0,0,0.1)'

              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center'
            }}>

                <path d="M 30,15 Q 20,10 15,20 Q 12,30 20,40 Q 30,45 40,38 L 45,45 Q 38,35 30,15 Z" 
                      fill="#FFD100" stroke="#005EB8" strokeWidth="3" strokeLinejoin="round"/>
                
                {/* Top Right Wing - Cyan/Blue */}
                <path d="M 70,15 Q 80,10 85,20 Q 88,30 80,40 Q 70,48 58,42 L 55,45 Q 62,35 70,15 Z" 
                      fill="#00AEEF" stroke="#005EB8" strokeWidth="3" strokeLinejoin="round"/>
                
                {/* Bottom Left Wing - Green */}
                <path d="M 30,85 Q 20,90 15,80 Q 10,68 20,58 Q 32,52 42,60 L 45,55 Q 38,65 30,85 Z" 
                      fill="#8DC63F" stroke="#005EB8" strokeWidth="3" strokeLinejoin="round"/>
                
                {/* Bottom Right Wing - Red */}
                <path d="M 70,85 Q 80,90 85,80 Q 90,68 80,58 Q 68,52 58,60 L 55,55 Q 62,65 70,85 Z" 
                      fill="#ED1C24" stroke="#005EB8" strokeWidth="3" strokeLinejoin="round"/>
                
                {/* Center body - overlapping wings create natural body */}
                <ellipse cx="50" cy="50" rx="5" ry="8" fill="#005EB8"/>
              </svg>
            </div>
            <h1 style={{ 
              margin: 0, 
              fontSize: '22px', 
              fontWeight: '700',
              letterSpacing: '-0.5px'
            }}>
              Pediatric BP Calculator
            </h1>
          </div>
          <p style={{ 
            margin: 0,

            Based on 2017 AAP Clinical Practice Guideline

      <div style={{ maxWidth: '480px', margin: '0 auto', padding: '20px' }}>

          <div style={{ marginBottom: '24px' }}>

                fontSize: '14px',

              </label>
              <span style={{

                color: COLORS.primary,
                backgroundColor: `${COLORS.primary}15`,
                padding: '4px 12px',
                borderRadius: '8px'

                {age} years
              </span>

            <input
              type="range"

              value={age}
              onChange={(e) => setAge(parseInt(e.target.value))}
              style={{

                background: `linear-gradient(to right, ${COLORS.primary} 0%, ${COLORS.primary} ${((age - 1) / 24) * 100}%, ${COLORS.border} ${((age - 1) / 24) * 100}%, ${COLORS.border} 100%)`,

          </div>

          {/* Sex Toggle */}
          <div style={{ marginBottom: '24px' }}>

            <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>

                placeholder={unit === 'cm' ? 'Enter height in cm' : 'Enter height in inches'}
                style={{

              />
              <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                <label style={{ 
                  display: 'flex', 
                  alignItems: 'center', 
                  cursor: 'pointer',
                  fontSize: '14px',
                  fontWeight: '500'
                }}>
                  <input
                    type="radio"
                    name="unit"
                    checked={unit === 'cm'}
                    onChange={() => setUnit('cm')}
                    style={{
                      marginRight: '6px',
                      cursor: 'pointer',
                      accentColor: COLORS.primary
                    }}
                  />
                  cm
                </label>
                <label style={{ 
                  display: 'flex', 
                  alignItems: 'center', 
                  cursor: 'pointer',
                  fontSize: '14px',
                  fontWeight: '500'
                }}>
                  <input
                    type="radio"
                    name="unit"
                    checked={unit === 'in'}
                    onChange={() => setUnit('in')}

                      marginRight: '6px',

                  in

        {/* Results Card */}
        {result && (

            }}>

            {/* BP Table */}
            <div style={{ overflowX: 'auto' }}>

              justifyContent: 'center',
              gap: '8px',
              transition: 'all 0.2s'
            }}
            onMouseEnter={(e) => {
              e.target.style.borderColor = COLORS.accent;
              e.target.style.color = COLORS.accent;
            }}
            onMouseLeave={(e) => {
              e.target.style.borderColor = COLORS.border;
              e.target.style.color = COLORS.dark;
            }}
          >
            <BookOpen size={18} />
            References
          </button>
        </div>

        {/* Instructions Panel */}
        {showInstructions && (
          <div style={{
            backgroundColor: 'white',
            borderRadius: '16px',
            padding: '24px',
            marginBottom: '16px',
            boxShadow: '0 2px 12px rgba(0,0,0,0.08)',
            border: `2px solid ${COLORS.secondary}40`
          }}>
            <h3 style={{ 
              margin: '0 0 16px 0', 
              fontSize: '18px', 
              fontWeight: '700',
              color: COLORS.secondary,
              display: 'flex',
              alignItems: 'center',
              gap: '8px'
            }}>
              <Info size={20} />
              Instructions for Use
            </h3>
            <div style={{ fontSize: '14px', lineHeight: '1.6', color: COLORS.dark }}>
              <p style={{ marginTop: 0 }}>This calculator provides blood pressure reference values based on the 2017 AAP Clinical Practice Guideline for Screening and Management of High Blood Pressure in Children and Adolescents.</p>
              
              <h4 style={{ marginTop: '16px', marginBottom: '8px', fontSize: '15px', fontWeight: '700', color: COLORS.primary }}>How to Use:</h4>
              <ol style={{ paddingLeft: '20px', margin: '8px 0' }}>
                <li style={{ marginBottom: '8px' }}>Use the slider to select the child's age (1-25 years)</li>
                <li style={{ marginBottom: '8px' }}>Toggle between Male or Female for the child's sex</li>
                <li style={{ marginBottom: '8px' }}>Enter the child's height and select units (cm or in) using radio buttons</li>
                <li style={{ marginBottom: '8px' }}>Results update automatically as you adjust inputs</li>
              </ol>

              <h4 style={{ marginTop: '16px', marginBottom: '8px', fontSize: '15px', fontWeight: '700', color: COLORS.primary }}>Important Notes:</h4>
              <ul style={{ paddingLeft: '20px', margin: '8px 0' }}>
                <li style={{ marginBottom: '8px' }}>For ages <strong>1-12</strong>: Uses the lesser of age-sex-height specific values OR adult thresholds</li>
                <li style={{ marginBottom: '8px' }}>For ages <strong>≥13</strong>: Uses adult thresholds (130/80 for Stage 1 HTN, 140/90 for Stage 2 HTN)</li>
                <li style={{ marginBottom: '8px' }}>Values are NOT interpolated - the calculator uses the highest table height that the patient's height exceeds</li>
                <li style={{ marginBottom: '8px' }}>Blood pressure should be confirmed on multiple visits before diagnosis</li>
              </ul>
            </div>
          </div>
        )}

        {/* References Panel */}
        {showReferences && (
          <div style={{
            backgroundColor: 'white',
            borderRadius: '16px',
            padding: '24px',
            marginBottom: '16px',
            boxShadow: '0 2px 12px rgba(0,0,0,0.08)',
            border: `2px solid ${COLORS.accent}40`
          }}>
            <h3 style={{ 
              margin: '0 0 16px 0', 
              fontSize: '18px', 
              fontWeight: '700',
              color: COLORS.accent,
              display: 'flex',
              alignItems: 'center',
              gap: '8px'
            }}>
              <BookOpen size={20} />
              Clinical References
            </h3>
            <div style={{ fontSize: '14px', lineHeight: '1.6', color: COLORS.dark }}>
              <h4 style={{ marginTop: 0, marginBottom: '12px', fontSize: '15px', fontWeight: '700', color: COLORS.primary }}>Primary Source:</h4>
              <p style={{ 
                margin: '0 0 16px 0', 
                padding: '12px',
                backgroundColor: `${COLORS.accent}08`,
                borderRadius: '8px',
                borderLeft: `4px solid ${COLORS.accent}`
              }}>
                Flynn JT, Kaelber DC, Baker-Smith CM, et al. Clinical Practice Guideline for Screening and Management of High Blood Pressure in Children and Adolescents. <em>Pediatrics</em>. 2017;140(3):e20171904. 
                <br /><br />
                <a 
                  href="https://publications.aap.org/pediatrics/article/140/3/e20171904/38358" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  style={{ color: COLORS.primary, fontWeight: '600', textDecoration: 'none' }}
                  onMouseEnter={(e) => e.target.style.textDecoration = 'underline'}
                  onMouseLeave={(e) => e.target.style.textDecoration = 'none'}
                >
                  View Full Guideline →
                </a>
              </p>

              <h4 style={{ marginBottom: '12px', fontSize: '15px', fontWeight: '700', color: COLORS.primary }}>Key Tables Used:</h4>
              <ul style={{ paddingLeft: '20px', margin: '0' }}>
                <li style={{ marginBottom: '8px' }}><strong>Table 3:</strong> Blood pressure classification for children and adolescents (adult thresholds)</li>
                <li style={{ marginBottom: '8px' }}><strong>Table 4:</strong> BP levels for boys by age and height percentile</li>
                <li style={{ marginBottom: '8px' }}><strong>Table 5:</strong> BP levels for girls by age and height percentile</li>
              </ul>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{
          textAlign: 'center',
          padding: '20px',
          fontSize: '13px',
          color: '#666'
        }}>
          <p style={{ margin: '0 0 8px 0' }}>
            <strong>Disclaimer:</strong> This calculator is for educational and clinical reference purposes only. Always use clinical judgment and confirm measurements before making diagnostic or treatment decisions.
          </p>
          <p style={{ margin: 0, opacity: 0.7 }}>
            Based on 2017 AAP Clinical Practice Guideline
          </p>
        </div>
      </div>
    </div>
  );
}
