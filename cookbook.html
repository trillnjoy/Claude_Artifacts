<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --rust: #8b3a1a;
    --gold: #c8962a;
    --faded: #9a8e7a;
    --cream: #faf7f2;
    --shadow: rgba(26,18,8,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier Prime', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(26,18,8,0.04) 27px,
        rgba(26,18,8,0.04) 28px
      );
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .wordmark span {
    color: var(--gold);
    font-style: italic;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faded);
    margin-top: 3px;
  }

  .header-stats {
    font-size: 11px;
    color: var(--faded);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* ── SEARCH ── */
  .search-bar {
    background: var(--cream);
    border-bottom: 2px solid var(--aged);
    padding: 16px 24px;
    position: sticky;
    top: 86px;
    z-index: 99;
  }

  .search-inner {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  #searchInput {
    width: 100%;
    font-family: 'Courier Prime', monospace;
    font-size: 16px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 0;
    padding: 10px 44px 10px 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  #searchInput:focus { border-color: var(--rust); }
  #searchInput::placeholder { color: var(--faded); font-style: italic; }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faded);
    font-size: 18px;
    pointer-events: none;
  }

  /* ── MAIN ── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── PANELS ── */
  .panel {
    display: none;
    padding-top: 24px;
  }
  .panel.active { display: block; }

  /* ── SETUP SCREEN ── */
  .setup-card {
    border: 2px solid var(--ink);
    background: var(--cream);
    padding: 28px;
    margin-top: 24px;
  }

  .setup-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin-bottom: 8px;
  }

  .setup-card p {
    font-size: 13px;
    color: var(--faded);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--ink);
  }

  input[type="text"], input[type="password"], textarea {
    width: 100%;
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 10px 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    border-radius: 0;
  }

  input:focus, textarea:focus { border-color: var(--rust); }

  textarea {
    resize: vertical;
    min-height: 120px;
    font-size: 12px;
    line-height: 1.5;
  }

  .btn {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px 22px;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .btn:hover { background: var(--rust); border-color: var(--rust); }
  .btn:active { transform: translateY(1px); }

  .btn-outline {
    background: transparent;
    color: var(--ink);
  }

  .btn-outline:hover { background: var(--ink); color: var(--paper); }

  .btn-sm {
    font-size: 11px;
    padding: 7px 14px;
  }

  .btn-danger {
    background: transparent;
    border-color: var(--rust);
    color: var(--rust);
  }
  .btn-danger:hover { background: var(--rust); color: var(--paper); }

  .mt { margin-top: 16px; }
  .mt-sm { margin-top: 10px; }
  .flex-gap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ── RESULTS ── */
  .results-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--faded);
    padding: 20px 0 10px;
    border-bottom: 1px solid var(--aged);
    margin-bottom: 0;
  }

  .result-group {
    border-bottom: 1px solid var(--aged);
  }

  .result-book-header {
    padding: 14px 0 6px;
    cursor: pointer;
    user-select: none;
  }

  .result-book-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
  }

  .result-book-author {
    font-size: 12px;
    color: var(--faded);
    font-style: italic;
    margin-top: 2px;
  }

  .result-recipes {
    padding-bottom: 12px;
  }

  .result-recipe {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0 5px 16px;
    font-size: 14px;
    border-left: 2px solid transparent;
    transition: border-color 0.1s;
  }

  .result-recipe:hover { border-left-color: var(--rust); }

  .recipe-name { flex: 1; line-height: 1.4; }

  .recipe-page {
    font-size: 12px;
    color: var(--gold);
    margin-left: 16px;
    white-space: nowrap;
    font-weight: 700;
  }

  .recipe-page.uncertain { color: var(--faded); font-weight: normal; }

  /* ── LIBRARY VIEW ── */
  .book-card {
    border: 1px solid var(--aged);
    background: var(--cream);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .book-cover {
    width: 48px;
    height: 64px;
    background: var(--aged);
    border: 1px solid var(--faded);
    flex-shrink: 0;
    object-fit: cover;
  }

  .book-cover-placeholder {
    width: 48px;
    height: 64px;
    background: var(--ink);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .book-info { flex: 1; min-width: 0; }

  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }

  .book-author {
    font-size: 12px;
    color: var(--faded);
    font-style: italic;
    margin-top: 2px;
  }

  .book-meta {
    font-size: 11px;
    color: var(--faded);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .book-meta .count { color: var(--rust); font-weight: 700; }

  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .dot-full { background: var(--gold); }
  .dot-partial { background: var(--faded); }
  .dot-none { background: #ccc; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    padding: 24px 0 16px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 20px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 2px solid var(--ink);
    margin-top: 24px;
  }

  .tab {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 18px;
    border: none;
    background: transparent;
    color: var(--faded);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }

  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--rust);
  }

  /* ── NOTICES ── */
  .notice {
    font-size: 13px;
    padding: 12px 16px;
    border-left: 3px solid var(--gold);
    background: var(--cream);
    color: var(--faded);
    margin: 16px 0;
    line-height: 1.5;
  }

  .notice.error { border-left-color: var(--rust); color: var(--rust); }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--aged);
    border-top-color: var(--rust);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ENRICH PROGRESS ── */
  .enrich-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--aged);
    font-size: 13px;
  }

  .enrich-title { flex: 1; }
  .enrich-status { font-size: 12px; color: var(--faded); }

  /* ── BOTTOM NAV ── */
  nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    border-top: 3px solid var(--gold);
    display: flex;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 14px 8px 12px;
    background: transparent;
    border: none;
    color: var(--faded);
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn:hover { color: var(--paper); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.7);
    z-index: 200;
    padding: 24px;
    overflow-y: auto;
  }

  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: var(--paper);
    border: 2px solid var(--ink);
    max-width: 560px;
    width: 100%;
    padding: 28px;
    margin-top: 40px;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .modal-close {
    float: right;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--faded);
    margin-top: -4px;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--faded);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

  .empty p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
  }

  /* UTILITY */
  .hidden { display: none !important; }
  .mt-lg { margin-top: 24px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wordmark">The <span>Shelf</span></div>
    <div class="tagline">Cookbook Catalog &amp; Recipe Finder</div>
    <div class="header-stats" id="headerStats">No books cataloged yet</div>
  </div>
</header>

<div class="search-bar">
  <div class="search-inner">
    <input type="text" id="searchInput" placeholder="croissant bread pudding, leek, osso buco…" autocomplete="off" autocorrect="off">
    <span class="search-icon">⌕</span>
  </div>
</div>

<main>
  <!-- SEARCH RESULTS -->
  <div id="panelSearch" class="panel active">
    <div id="searchResults"></div>
  </div>

  <!-- LIBRARY -->
  <div id="panelLibrary" class="panel">
    <div class="section-title">Your Library</div>
    <div id="libraryList"></div>
  </div>

  <!-- IMPORT -->
  <div id="panelImport" class="panel">
    <div class="section-title">Add Books</div>

    <div class="tabs">
      <button class="tab active" onclick="switchImportTab('paste')">Paste JSON</button>
      <button class="tab" onclick="switchImportTab('manual')">Manual Entry</button>
      <button class="tab" onclick="switchImportTab('settings')">Settings</button>
    </div>

    <!-- PASTE JSON -->
    <div id="tabPaste" style="padding-top:20px;">
      <p style="font-size:13px; color:var(--faded); line-height:1.6; margin-bottom:16px;">
        Photograph your shelves in a Claude chat session. Ask Claude to return a JSON array of <code>{"title","author"}</code> objects. Paste the result below.
      </p>
      <label>JSON Catalog</label>
      <textarea id="jsonInput" placeholder='[{"title":"The Forest Feast","author":"Erin Gleeson","isbn":"9781419712326"},{"title":"The Forest Feast: Gatherings","author":"Erin Gleeson"}]'></textarea>
      <div class="flex-gap mt">
        <button class="btn" onclick="importJSON()">Import &amp; Enrich</button>
        <button class="btn btn-outline btn-sm" onclick="validateJSON()">Validate</button>
      </div>
      <div id="jsonNotice"></div>
    </div>

    <!-- MANUAL ENTRY -->
    <div id="tabManual" class="hidden" style="padding-top:20px;">
      <label>Title</label>
      <input type="text" id="manualTitle" placeholder="The French Laundry Cookbook">
      <label class="mt-sm">Author</label>
      <input type="text" id="manualAuthor" placeholder="Thomas Keller" style="margin-top:6px;">
      <label class="mt-sm">ISBN <span style="font-size:10px;color:var(--faded);text-transform:none;letter-spacing:0">(optional — use to disambiguate series)</span></label>
      <input type="text" id="manualIsbn" placeholder="9781419712326" style="margin-top:6px;">
      <div class="flex-gap mt">
        <button class="btn" onclick="addManualBook()">Add &amp; Enrich</button>
      </div>
      <div id="manualNotice"></div>
    </div>

    <!-- SETTINGS -->
    <div id="tabSettings" class="hidden" style="padding-top:20px;">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-…">
      <div class="flex-gap mt">
        <button class="btn" onclick="saveApiKey()">Save Key</button>
        <button class="btn btn-outline btn-sm btn-danger" onclick="clearAll()">Clear All Data</button>
      </div>
      <div id="settingsNotice"></div>

      <div class="mt-lg">
        <label>Export Catalog</label>
        <div class="flex-gap mt-sm">
          <button class="btn btn-outline btn-sm" onclick="exportCatalog()">Download JSON</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Bottom Nav -->
<nav>
  <button class="nav-btn active" id="navSearch" onclick="switchPanel('Search')">
    <span class="nav-icon">⌕</span>Search
  </button>
  <button class="nav-btn" id="navLibrary" onclick="switchPanel('Library')">
    <span class="nav-icon">📚</span>Library
  </button>
  <button class="nav-btn" id="navImport" onclick="switchPanel('Import')">
    <span class="nav-icon">＋</span>Add Books
  </button>
</nav>

<!-- Enrich Modal -->
<div class="modal-overlay" id="enrichModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEnrichModal()">×</button>
    <h3>Enriching Library</h3>
    <div id="enrichProgress"></div>
  </div>
</div>

<script>
// ── DB ──────────────────────────────────────────────────────────────────────
const DB_NAME = 'TheShelfDB';
const DB_VER = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books')) {
        d.createObjectStore('books', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}

function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(store, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ── GOOGLE BOOKS ────────────────────────────────────────────────────────────
async function enrichBook(title, author, isbn) {
  // ISBN lookup is authoritative — use it when available
  let searchUrl;
  if (isbn) {
    const clean = isbn.replace(/[-\s]/g, '');
    searchUrl = `https://www.googleapis.com/books/v1/volumes?q=isbn:${clean}&maxResults=1&fields=items(id,volumeInfo)`;
  } else {
    const q = encodeURIComponent(`intitle:${title} inauthor:${author}`);
    searchUrl = `https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=3&fields=items(id,volumeInfo)`;
  }
  try {
    const r = await fetch(searchUrl);
    const data = await r.json();
    if (!data.items || !data.items.length) return null;

    // Pick best match
    const item = data.items[0];
    const vi = item.volumeInfo;

    // Fetch full volume for ToC
    const fullUrl = `https://www.googleapis.com/books/v1/volumes/${item.id}?fields=volumeInfo(title,authors,publishedDate,imageLinks,tableOfContents,description,pageCount)`;
    const fullR = await fetch(fullUrl);
    const fullData = await fullR.json();
    const fvi = fullData.volumeInfo || vi;

    return {
      gbId: item.id,
      confirmedTitle: fvi.title || title,
      confirmedAuthor: (fvi.authors || [author]).join(', '),
      publishedDate: fvi.publishedDate || '',
      pageCount: fvi.pageCount || null,
      cover: fvi.imageLinks ? (fvi.imageLinks.thumbnail || fvi.imageLinks.smallThumbnail || null) : null,
      description: fvi.description || '',
      toc: fvi.tableOfContents || null
    };
  } catch (e) {
    return null;
  }
}

// ── RECIPE PARSING ──────────────────────────────────────────────────────────
// Google Books ToC entries look like: { title, pageIds, children }
// We extract likely recipe entries (leaves or shallow items) with page numbers
function parseRecipesFromToc(toc) {
  if (!toc) return [];
  const recipes = [];

  function walk(items, depth) {
    if (!items) return;
    for (const item of items) {
      const name = item.title || '';
      // Leaf nodes at depth >= 1 or items with no children are likely recipes
      const isLeaf = !item.children || item.children.length === 0;
      const pageStr = item.pageIds && item.pageIds.length ? item.pageIds[0] : null;
      const pageNum = pageStr ? parseInt(pageStr, 10) : null;
      const highConfidence = !isNaN(pageNum) && pageNum > 0;

      if (depth >= 1 && name.length > 2) {
        recipes.push({
          name,
          page: highConfidence ? pageNum : null,
          highConfidence
        });
      }
      if (item.children) walk(item.children, depth + 1);
    }
  }

  walk(toc, 0);
  return recipes;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let allBooks = [];

async function loadBooks() {
  allBooks = await dbGetAll('books');
  updateHeaderStats();
}

function updateHeaderStats() {
  const total = allBooks.length;
  const recipeCount = allBooks.reduce((n, b) => n + (b.recipes ? b.recipes.length : 0), 0);
  const el = document.getElementById('headerStats');
  if (total === 0) {
    el.textContent = 'No books cataloged yet';
  } else {
    el.textContent = `${total} book${total !== 1 ? 's' : ''} · ${recipeCount.toLocaleString()} recipes indexed`;
  }
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(e.target.value.trim()), 200);
});

function doSearch(query) {
  const el = document.getElementById('searchResults');
  if (!query) {
    el.innerHTML = renderSearchHome();
    return;
  }

  const q = query.toLowerCase();
  const grouped = [];

  for (const book of allBooks) {
    if (!book.recipes || !book.recipes.length) continue;
    const matches = book.recipes.filter(r => r.name.toLowerCase().includes(q));
    if (matches.length) grouped.push({ book, matches });
  }

  if (!grouped.length) {
    el.innerHTML = `<div class="notice">No recipes found matching <strong>${escHtml(query)}</strong>.</div>`;
    return;
  }

  let html = `<div class="results-label">${grouped.reduce((n,g)=>n+g.matches.length,0)} result${grouped.reduce((n,g)=>n+g.matches.length,0)!==1?'s':''} in ${grouped.length} book${grouped.length!==1?'s':''}</div>`;

  for (const { book, matches } of grouped) {
    html += `<div class="result-group">
      <div class="result-book-header">
        <div class="result-book-title">${escHtml(book.confirmedTitle || book.title)}</div>
        <div class="result-book-author">${escHtml(book.confirmedAuthor || book.author)}</div>
      </div>
      <div class="result-recipes">`;
    for (const r of matches) {
      const pageHtml = r.highConfidence && r.page
        ? `<span class="recipe-page">p. ${r.page}</span>`
        : '';
      html += `<div class="result-recipe">
        <span class="recipe-name">${highlightMatch(escHtml(r.name), escHtml(query))}</span>
        ${pageHtml}
      </div>`;
    }
    html += `</div></div>`;
  }

  el.innerHTML = html;
}

function highlightMatch(text, query) {
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<strong style="color:var(--rust)">$1</strong>');
}

function renderSearchHome() {
  if (!allBooks.length) {
    return `<div class="empty"><div class="empty-icon">📖</div><p>Add books to get started</p></div>`;
  }
  const total = allBooks.length;
  const recipeCount = allBooks.reduce((n, b) => n + (b.recipes ? b.recipes.length : 0), 0);
  return `<div class="notice">
    ${total} book${total!==1?'s':''} · ${recipeCount.toLocaleString()} recipes indexed.<br>
    Type a dish name or ingredient above.
  </div>`;
}

// ── LIBRARY ──────────────────────────────────────────────────────────────────
function renderLibrary() {
  const el = document.getElementById('libraryList');
  if (!allBooks.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div><p>No books yet</p></div>`;
    return;
  }

  const sorted = [...allBooks].sort((a, b) =>
    (a.confirmedAuthor || a.author || '').localeCompare(b.confirmedAuthor || b.author || ''));

  let html = '';
  for (const book of sorted) {
    const recipeCount = book.recipes ? book.recipes.length : 0;
    const hasIndex = recipeCount > 0;
    const dotClass = hasIndex ? 'dot-full' : 'dot-none';
    const statusText = hasIndex ? `${recipeCount} recipes` : 'no index available';

    const coverHtml = book.cover
      ? `<img src="${book.cover}" class="book-cover" alt="">`
      : `<div class="book-cover-placeholder">📖</div>`;

    html += `<div class="book-card">
      ${coverHtml}
      <div class="book-info">
        <div class="book-title">${escHtml(book.confirmedTitle || book.title)}</div>
        <div class="book-author">${escHtml(book.confirmedAuthor || book.author)}</div>
        <div class="book-meta">
          <span class="status-dot ${dotClass}"></span>${statusText}
          ${book.pageCount ? ` · ${book.pageCount} pages` : ''}
          ${book.publishedDate ? ` · ${book.publishedDate.slice(0,4)}` : ''}
        </div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="deleteBook('${book.id}')">×</button>
    </div>`;
  }
  el.innerHTML = html;
}

async function deleteBook(id) {
  if (!confirm('Remove this book from your catalog?')) return;
  await dbDelete('books', id);
  allBooks = allBooks.filter(b => b.id !== id);
  updateHeaderStats();
  renderLibrary();
}

// ── IMPORT ───────────────────────────────────────────────────────────────────
function switchImportTab(tab) {
  ['paste','manual','settings'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tabs .tab').forEach((el, i) => {
    el.classList.toggle('active', ['paste','manual','settings'][i] === tab);
  });
}

function validateJSON() {
  const raw = document.getElementById('jsonInput').value.trim();
  const notice = document.getElementById('jsonNotice');
  try {
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error('Must be an array');
    const valid = arr.filter(x => x.title);
    notice.innerHTML = `<div class="notice">✓ Valid — ${valid.length} book${valid.length!==1?'s':''} found.</div>`;
  } catch (e) {
    notice.innerHTML = `<div class="notice error">Invalid JSON: ${e.message}</div>`;
  }
}

async function importJSON() {
  const raw = document.getElementById('jsonInput').value.trim();
  const notice = document.getElementById('jsonNotice');
  let arr;
  try {
    arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error('Must be an array');
  } catch (e) {
    notice.innerHTML = `<div class="notice error">Invalid JSON: ${e.message}</div>`;
    return;
  }

  const books = arr.filter(x => x.title).map(x => ({
    title: x.title,
    author: x.author || '',
    isbn: x.isbn || null
  }));

  if (!books.length) {
    notice.innerHTML = `<div class="notice error">No valid books found.</div>`;
    return;
  }

  await enrichAndSaveBooks(books);
  document.getElementById('jsonInput').value = '';
  notice.innerHTML = '';
}

async function addManualBook() {
  const title = document.getElementById('manualTitle').value.trim();
  const author = document.getElementById('manualAuthor').value.trim();
  const isbn = document.getElementById('manualIsbn').value.trim() || null;
  const notice = document.getElementById('manualNotice');
  if (!title) {
    notice.innerHTML = `<div class="notice error">Title required.</div>`;
    return;
  }
  await enrichAndSaveBooks([{ title, author, isbn }]);
  document.getElementById('manualTitle').value = '';
  document.getElementById('manualAuthor').value = '';
  document.getElementById('manualIsbn').value = '';
  notice.innerHTML = '';
}

async function enrichAndSaveBooks(books) {
  openEnrichModal();
  const prog = document.getElementById('enrichProgress');
  prog.innerHTML = '';

  for (const book of books) {
    const row = document.createElement('div');
    row.className = 'enrich-row';
    row.innerHTML = `<span class="enrich-title">${escHtml(book.title)}</span><span class="enrich-status"><span class="spinner"></span>fetching…</span>`;
    prog.appendChild(row);

    const status = row.querySelector('.enrich-status');

    const enriched = await enrichBook(book.title, book.author, book.isbn);
    const recipes = enriched && enriched.toc ? parseRecipesFromToc(enriched.toc) : [];

    const id = slugify(book.title + '-' + book.author);
    const record = {
      id,
      title: book.title,
      author: book.author,
      ...(enriched || {}),
      recipes,
      addedAt: Date.now()
    };

    await dbPut('books', record);
    allBooks = allBooks.filter(b => b.id !== id);
    allBooks.push(record);

    if (enriched) {
      status.innerHTML = recipes.length
        ? `<span style="color:var(--gold)">✓ ${recipes.length} recipes</span>`
        : `<span style="color:var(--faded)">✓ matched, no index</span>`;
    } else {
      status.innerHTML = `<span style="color:var(--faded)">not found in Google Books</span>`;
    }
  }

  updateHeaderStats();
  prog.innerHTML += `<div class="flex-gap" style="padding-top:16px;"><button class="btn" onclick="closeEnrichModal()">Done</button></div>`;
}

function openEnrichModal() {
  document.getElementById('enrichModal').classList.add('open');
}

function closeEnrichModal() {
  document.getElementById('enrichModal').classList.remove('open');
  renderLibrary();
  doSearch(document.getElementById('searchInput').value.trim());
}

// ── SETTINGS ─────────────────────────────────────────────────────────────────
async function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const notice = document.getElementById('settingsNotice');
  if (!key.startsWith('sk-')) {
    notice.innerHTML = `<div class="notice error">Key should start with sk-</div>`;
    return;
  }
  await dbPut('settings', { key: 'apiKey', value: key });
  document.getElementById('apiKeyInput').value = '';
  notice.innerHTML = `<div class="notice">API key saved.</div>`;
}

async function clearAll() {
  if (!confirm('Delete all books and settings? This cannot be undone.')) return;
  const books = await dbGetAll('books');
  for (const b of books) await dbDelete('books', b.id);
  allBooks = [];
  updateHeaderStats();
  renderLibrary();
  document.getElementById('settingsNotice').innerHTML = `<div class="notice">All data cleared.</div>`;
}

function exportCatalog() {
  const data = JSON.stringify(allBooks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'the-shelf-catalog.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── NAV ──────────────────────────────────────────────────────────────────────
function switchPanel(name) {
  ['Search','Library','Import'].forEach(n => {
    document.getElementById('panel' + n).classList.toggle('active', n === name);
    document.getElementById('nav' + n).classList.toggle('active', n === name);
  });
  if (name === 'Library') renderLibrary();
  if (name === 'Search') doSearch(document.getElementById('searchInput').value.trim());
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  await openDB();
  await loadBooks();

  // Pre-fill API key if saved
  const saved = await dbGet('settings', 'apiKey');
  if (saved) document.getElementById('apiKeyInput').value = saved.value;

  doSearch('');
})();
</script>
