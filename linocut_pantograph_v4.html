<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Linocut Pantograph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital@0;1&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0f0d0a;
  --surface:  #181410;
  --border:   #3a2e1e;
  --gold:     #c8a45a;
  --gold2:    #8a6a30;
  --text:     #ecdfc8;
  --dim:      #8a7a60;
  --red:      rgba(210,40,20,0.55);
  --red-solid:#d22814;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  width: 100%; height: 100%;
  min-height: -webkit-fill-available;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ── LAYOUT: header + dual panes + toolbar, all in one screen ── */
#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
  height: -webkit-fill-available;
  overflow: hidden;
}

/* ── HEADER ── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  height: 44px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

/* ── PANE ROW — takes all space between header and toolbar ── */
#panes {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── TOOLBAR — fixed height, never shrinks ── */
#toolbar {
  flex-shrink: 0;
  height: 58px;
  min-height: 58px;
  max-height: 58px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  white-space: nowrap;
}

#title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 5px;
  color: var(--gold);
}

#header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

#pencil-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
}

#pressure-bar {
  width: 48px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
#pressure-fill {
  height: 100%;
  background: var(--gold);
  width: 0%;
  border-radius: 2px;
  transition: width 0.04s;
}

/* ── PANE ── */
.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
  position: relative;
}

.pane-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  text-align: center;
  padding: 4px 0;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.pane-label span {
  color: var(--gold);
  font-weight: bold;
}

#pane-divider {
  width: 1px;
  background: var(--border);
  flex-shrink: 0;
}

/* Canvas container — fills pane, centers image */
.canvas-host {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  background: #0a0806;
  touch-action: none;
}

.canvas-host canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
}

/* Upload overlay */
.upload-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #0a0806;
  cursor: pointer;
  z-index: 20;
}

.upload-overlay .up-arrow {
  font-size: 28px;
  color: var(--gold2);
}

.upload-overlay .up-text {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  text-align: center;
  line-height: 1.9;
}

/* suppress scrollbar on toolbar */
#toolbar::-webkit-scrollbar { display: none; }

.tb-sep {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* Gouge buttons */
.g-btn {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  padding: 4px 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--dim);
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  flex-shrink: 0;
  min-width: 46px;
  height: 44px;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
  transition: all 0.1s;
}

.g-btn svg path, .g-btn svg line { stroke: var(--dim); }

.g-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #0f0d0a;
}

.g-btn.active svg path,
.g-btn.active svg line { stroke: #0f0d0a; }

/* Pill buttons */
.pill-group {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}

.p-btn {
  padding: 0 12px;
  height: 36px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
  transition: all 0.1s;
}

.p-btn:last-child { border-right: none; }
.p-btn.active { background: var(--gold); color: #0f0d0a; font-weight: bold; }
.p-btn:not(.active):active { background: #2a2018; }

/* Size slider */
#size-wrap {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  min-width: 110px;
}

#size-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
}

input[type=range] {
  -webkit-appearance: none;
  width: 80px;
  height: 2px;
  background: var(--border);
  outline: none;
  border-radius: 2px;
  flex-shrink: 0;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  background: var(--gold);
  border-radius: 50%;
  cursor: pointer;
}

#size-val {
  font-size: 12px;
  color: var(--gold);
  min-width: 22px;
  font-weight: bold;
}

/* Action buttons */
.a-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  height: 36px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
  transition: all 0.1s;
}

.a-btn:disabled { opacity: 0.28; cursor: default; }
.a-btn.gold { border-color: var(--gold2); color: var(--gold); }
.a-btn.gold:not(:disabled):active { background: var(--gold); color: #0f0d0a; }
.a-btn:not(.gold):not(:disabled):active { background: #2a2018; border-color: var(--gold); }

#undo-count { font-size: 9px; color: var(--dim); margin-left: 2px; }

/* Crosshair cursor overlay on block pane — shows registered pointer position */
#crosshair {
  position: absolute;
  pointer-events: none;
  z-index: 30;
  display: none;
}

#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: var(--red-solid);
  opacity: 0.85;
}

#crosshair::before {
  width: 1px; height: 20px;
  top: -10px; left: 0;
}

#crosshair::after {
  width: 20px; height: 1px;
  top: 0; left: -10px;
}

/* ── CROP REGISTRATION MODAL ── */
#crop-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #0a0806;
  flex-direction: column;
}

#crop-modal.visible { display: flex; }

#crop-header {
  flex-shrink: 0;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

#crop-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 4px;
  color: var(--gold);
}

#crop-instructions {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--dim);
  text-transform: uppercase;
}

#crop-confirm {
  padding: 0 20px;
  height: 36px;
  background: var(--gold);
  border: none;
  border-radius: 4px;
  color: #0f0d0a;
  font-family: 'Courier Prime', monospace;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  touch-action: manipulation;
  flex-shrink: 0;
}

#crop-canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

#crop-canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
  touch-action: none;
}

/* Corner handle dots */
.crop-handle {
  position: absolute;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--gold);
  border: 3px solid #fff;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%);
  touch-action: none;
  cursor: grab;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-family: 'Courier Prime', monospace;
  letter-spacing: 1px;
  color: #0f0d0a;
  font-weight: bold;
  user-select: none;
  -webkit-user-select: none;
}

.crop-handle:active { cursor: grabbing; background: #fff; }

/* ── LOUPE ── */
#crop-loupe {
  position: fixed;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 4px 20px rgba(0,0,0,0.8);
  overflow: hidden;
  pointer-events: none;
  display: none;
  z-index: 200;
}

#loupe-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 140px;
  height: 140px;
}

#crop-loupe::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right,  transparent calc(50% - 0.5px), rgba(210,40,20,0.95) calc(50% - 0.5px), rgba(210,40,20,0.95) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
    linear-gradient(to bottom, transparent calc(50% - 0.5px), rgba(210,40,20,0.95) calc(50% - 0.5px), rgba(210,40,20,0.95) calc(50% + 0.5px), transparent calc(50% + 0.5px));
  border-radius: 50%;
  z-index: 2;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="title">Linocut Pantograph</div>
    <div id="header-right">
      <span id="pencil-label">Pencil</span>
      <div id="pressure-bar"><div id="pressure-fill"></div></div>
    </div>
  </div>

  <!-- DUAL PANES -->
  <div id="panes">

    <!-- LEFT: Last Print (source of truth) -->
    <div class="pane" id="pane-print">
      <div class="pane-label"><span>Last Print</span> — mark areas to reduce</div>
      <div class="canvas-host" id="host-print">
        <canvas id="base-print"></canvas>   <!-- original print -->
        <canvas id="erase-print"></canvas>  <!-- erasure overlay (darkens/removes) -->
        <canvas id="draw-print"></canvas>   <!-- interaction layer -->
        <div class="upload-overlay" id="over-print" onclick="document.getElementById('file-print').click()">
          <div class="up-arrow">↑</div>
          <div class="up-text">Load last print</div>
        </div>
        <input type="file" id="file-print" accept="image/*">
      </div>
    </div>

    <div id="pane-divider"></div>

    <!-- RIGHT: Block (mirror-flipped, red mask) -->
    <div class="pane" id="pane-block">
      <div class="pane-label"><span>Block</span> — registered mirror · red = carve here</div>
      <div class="canvas-host" id="host-block">
        <canvas id="base-block"></canvas>   <!-- block photo, flipped -->
        <canvas id="mask-block"></canvas>   <!-- red carve mask -->
        <div id="crosshair"></div>
        <div class="upload-overlay" id="over-block" onclick="document.getElementById('file-block').click()">
          <div class="up-arrow">↑</div>
          <div class="up-text">Load block photo</div>
        </div>
        <input type="file" id="file-block" accept="image/*">
      </div>
    </div>

  </div>

  <!-- TOOLBAR — single row -->
  <div id="toolbar">

    <!-- Gouge tools -->
    <span style="font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;flex-shrink:0;">Gouge</span>

    <button class="g-btn" id="g-knife" onclick="setGouge('knife')">
      <svg width="32" height="10" viewBox="0 0 32 10">
        <line x1="3" y1="5" x2="29" y2="5" stroke="#c8a45a" stroke-width="0.7" stroke-linecap="round"/>
      </svg>
      Knife
    </button>

    <button class="g-btn active" id="g-vfine" onclick="setGouge('vfine')">
      <svg width="32" height="12" viewBox="0 0 32 12">
        <path d="M13 2 L16 10 L19 2" stroke="#c8a45a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      V Fine
    </button>

    <button class="g-btn" id="g-vwide" onclick="setGouge('vwide')">
      <svg width="32" height="12" viewBox="0 0 32 12">
        <path d="M7 2 L16 10 L25 2" stroke="#c8a45a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      V Wide
    </button>

    <button class="g-btn" id="g-usmall" onclick="setGouge('usmall')">
      <svg width="32" height="12" viewBox="0 0 32 12">
        <path d="M8 2 Q8 11 16 11 Q24 11 24 2" stroke="#c8a45a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      U Gouge
    </button>

    <button class="g-btn" id="g-ularge" onclick="setGouge('ularge')">
      <svg width="32" height="12" viewBox="0 0 32 12">
        <path d="M2 2 Q2 11 16 11 Q30 11 30 2" stroke="#c8a45a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      U Large
    </button>

    <div class="tb-sep"></div>

    <!-- Mode -->
    <div class="pill-group">
      <button class="p-btn active" id="m-carve" onclick="setMode('carve')">Carve</button>
      <button class="p-btn" id="m-restore" onclick="setMode('restore')">Restore</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Size -->
    <div id="size-wrap">
      <span id="size-label">Size</span>
      <input type="range" id="size-slider" min="3" max="80" value="16">
      <span id="size-val">16</span>
    </div>

    <div class="tb-sep"></div>

    <!-- Toggle original -->
    <button class="a-btn" id="toggle-btn" onclick="toggleOriginal()">👁 Original</button>

    <div class="tb-sep"></div>

    <!-- Undo / Clear -->
    <button class="a-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo<span id="undo-count"></span></button>
    <button class="a-btn" onclick="clearAll()">✕ Clear</button>

    <div class="tb-sep"></div>

    <!-- Save outputs -->
    <button class="a-btn gold" onclick="savePrint()">↓ Print</button>
    <button class="a-btn gold" onclick="saveBlock()">↓ Block</button>

    <div class="tb-sep"></div>
    <button class="a-btn" onclick="reRegister()" title="Re-adjust block crop registration">⊹ Register</button>

  </div>

</div><!-- /app -->

<!-- CROP REGISTRATION MODAL -->
<div id="crop-modal">
  <div id="crop-header">
    <div>
      <div id="crop-title">Register Block</div>
      <div id="crop-instructions">Drag the four corners to the edges of the lino plate</div>
    </div>
    <button id="crop-confirm" onclick="confirmCrop()">✓ Confirm Registration</button>
  </div>
  <div id="crop-canvas-wrap">
    <canvas id="crop-canvas"></canvas>
    <div class="crop-handle" id="handle-ul" data-corner="ul">UL</div>
    <div class="crop-handle" id="handle-ur" data-corner="ur">UR</div>
    <div class="crop-handle" id="handle-ll" data-corner="ll">LL</div>
    <div class="crop-handle" id="handle-lr" data-corner="lr">LR</div>
    <div id="crop-loupe"><canvas id="loupe-canvas"></canvas></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────
let printImg  = null;
let blockImg  = null;
let gouge     = 'vfine';
let mode      = 'carve';   // carve | restore
let penActive = false;
let isDrawing = false;
let lastX = 0, lastY = 0;
let pressure  = 1.0;
let showingOriginal = false;

const MAX_UNDO = 40;
const undoStack = []; // each entry: { printSnap, blockSnap }

// ── Canvas refs ────────────────────────────────────────────────────
const basePrint  = document.getElementById('base-print');
const erasePrint = document.getElementById('erase-print');
const drawPrint  = document.getElementById('draw-print');
const baseBlock  = document.getElementById('base-block');
const maskBlock  = document.getElementById('mask-block');

const bpCtx = basePrint.getContext('2d');
const epCtx = erasePrint.getContext('2d');
const dpCtx = drawPrint.getContext('2d');
const bbCtx = baseBlock.getContext('2d');
const mbCtx = maskBlock.getContext('2d');

// ── Sizing ─────────────────────────────────────────────────────────
// Both panes share the same canvas height. Width is per-pane.
let canvasH = 100;

function sizeCanvases() {
  // Read actual rendered dimensions — CSS flexbox handles the layout,
  // we just need to match canvas pixel dimensions to what's displayed.
  const pw = document.getElementById('host-print').clientWidth  || 100;
  const ph = document.getElementById('host-print').clientHeight || 100;
  const bw = document.getElementById('host-block').clientWidth  || 100;
  const bh = document.getElementById('host-block').clientHeight || 100;
  canvasH = ph;

  // Size print canvases
  [basePrint, erasePrint, drawPrint].forEach(c => {
    c.width  = pw; c.height = ph;
    c.style.width  = pw + 'px';
    c.style.height = ph + 'px';
  });

  // Size block canvases
  [baseBlock, maskBlock].forEach(c => {
    c.width  = bw; c.height = bh;
    c.style.width  = bw + 'px';
    c.style.height = bh + 'px';
  });

  // Redraw
  if (printImg) drawPrintImage();
  if (blockImg) drawBlockImage();
}

function drawPrintImage() {
  const w = basePrint.width, h = basePrint.height;
  const scale = Math.min(w / printImg.width, h / printImg.height);
  const dw = Math.round(printImg.width  * scale);
  const dh = Math.round(printImg.height * scale);
  const ox = Math.round((w - dw) / 2);
  const oy = Math.round((h - dh) / 2);
  bpCtx.clearRect(0, 0, w, h);
  bpCtx.drawImage(printImg, ox, oy, dw, dh);
  // Store draw offset for coord mapping
  basePrint._ox = ox; basePrint._oy = oy;
  basePrint._dw = dw; basePrint._dh = dh;
  basePrint._scale = scale;
}

function drawBlockImage() {
  const w = baseBlock.width, h = baseBlock.height;
  // Use crop region if registered, else full image
  const src = blockCrop
    ? { sx: blockCrop.x, sy: blockCrop.y, sw: blockCrop.w, sh: blockCrop.h }
    : { sx: 0,           sy: 0,           sw: blockImg.width, sh: blockImg.height };

  const scale = Math.min(w / src.sw, h / src.sh);
  const dw = Math.round(src.sw * scale);
  const dh = Math.round(src.sh * scale);
  const ox = Math.round((w - dw) / 2);
  const oy = Math.round((h - dh) / 2);
  bbCtx.clearRect(0, 0, w, h);
  // Draw block mirrored horizontally using crop region
  bbCtx.save();
  bbCtx.translate(w, 0);
  bbCtx.scale(-1, 1);
  // drawImage(img, srcX, srcY, srcW, srcH, destX, destY, destW, destH)
  bbCtx.drawImage(blockImg, src.sx, src.sy, src.sw, src.sh, ox, oy, dw, dh);
  bbCtx.restore();
  baseBlock._ox = ox; baseBlock._oy = oy;
  baseBlock._dw = dw; baseBlock._dh = dh;
}

// ── File loading ───────────────────────────────────────────────────
document.getElementById('file-print').onchange = function(e) {
  loadImage(e.target.files[0], img => {
    printImg = img;
    document.getElementById('over-print').style.display = 'none';
    sizeCanvases();
    epCtx.clearRect(0, 0, erasePrint.width, erasePrint.height);
    undoStack.length = 0; updateUndoBtn();
  });
};

document.getElementById('file-block').onchange = function(e) {
  loadImage(e.target.files[0], img => {
    blockImg = img;
    document.getElementById('over-block').style.display = 'none';
    openCropModal(img);
  });
};

// ── Crop registration ──────────────────────────────────────────────
// blockCrop stores the registered region in image-native pixels:
// { x, y, w, h } — the sub-rectangle of blockImg that maps to the full print
let blockCrop = null;

// crop-canvas display scale
let cropScale = 1;
let cropOffX  = 0;
let cropOffY  = 0;

// Handle positions in CSS pixels relative to crop-canvas-wrap
const handles = { ul: null, ur: null, ll: null, lr: null };

function openCropModal(img) {
  const modal  = document.getElementById('crop-modal');
  const canvas = document.getElementById('crop-canvas');
  const wrap   = document.getElementById('crop-canvas-wrap');
  modal.classList.add('visible');

  // Wait for layout
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const ww = wrap.clientWidth  || window.innerWidth;
      const wh = wrap.clientHeight || (window.innerHeight - 52);

      cropScale = Math.min(ww / img.width, wh / img.height, 1);
      const cw  = Math.round(img.width  * cropScale);
      const ch  = Math.round(img.height * cropScale);
      canvas.width  = cw;
      canvas.height = ch;
      canvas.style.width  = cw + 'px';
      canvas.style.height = ch + 'px';

      // Draw image on crop canvas (no flip — we're defining the physical plate boundary)
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, cw, ch);

      // canvas offset within wrap (centred)
      const rect = canvas.getBoundingClientRect();
      const wrapRect = wrap.getBoundingClientRect();
      cropOffX = rect.left - wrapRect.left;
      cropOffY = rect.top  - wrapRect.top;

      // Place handles at 15% inset from corners as starting position
      const insetX = cw * 0.08;
      const insetY = ch * 0.08;
      setHandlePos('ul', cropOffX + insetX,      cropOffY + insetY);
      setHandlePos('ur', cropOffX + cw - insetX, cropOffY + insetY);
      setHandlePos('ll', cropOffX + insetX,      cropOffY + ch - insetY);
      setHandlePos('lr', cropOffX + cw - insetX, cropOffY + ch - insetY);

      drawCropOverlay();
      initHandleDrag();
    });
  });
}

function setHandlePos(corner, x, y) {
  const h = document.getElementById('handle-' + corner);
  h.style.left = x + 'px';
  h.style.top  = y + 'px';
  handles[corner] = { x, y };
}

function drawCropOverlay() {
  const canvas = document.getElementById('crop-canvas');
  const ctx    = canvas.getContext('2d');
  const wrap   = document.getElementById('crop-canvas-wrap');
  const cw = canvas.width, ch = canvas.height;

  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(blockImg, 0, 0, cw, ch);

  // Convert handle CSS positions to canvas-local coords
  const pts = {};
  for (const [k, v] of Object.entries(handles)) {
    if (!v) return;
    pts[k] = {
      x: v.x - cropOffX,
      y: v.y - cropOffY
    };
  }

  // Dim outside the quad
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, cw, ch);

  // Cut out the selected quad
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.moveTo(pts.ul.x, pts.ul.y);
  ctx.lineTo(pts.ur.x, pts.ur.y);
  ctx.lineTo(pts.lr.x, pts.lr.y);
  ctx.lineTo(pts.ll.x, pts.ll.y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Draw quad outline
  ctx.strokeStyle = 'rgba(200,164,90,0.9)';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(pts.ul.x, pts.ul.y);
  ctx.lineTo(pts.ur.x, pts.ur.y);
  ctx.lineTo(pts.lr.x, pts.lr.y);
  ctx.lineTo(pts.ll.x, pts.ll.y);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
}

function initHandleDrag() {
  const LOUPE_D    = 140;   // diameter px
  const LOUPE_ZOOM = 3.5;
  const LOUPE_GAP  = 24;    // px gap above finger

  const loupe      = document.getElementById('crop-loupe');
  const loupeCanvas= document.getElementById('loupe-canvas');
  const loupeCtx   = loupeCanvas.getContext('2d');
  loupeCanvas.width  = LOUPE_D;
  loupeCanvas.height = LOUPE_D;

  function updateLoupe(clientX, clientY) {
    // Always read fresh rect so fixed positioning is accurate
    const canvas   = document.getElementById('crop-canvas');
    const cRect    = canvas.getBoundingClientRect();

    // Position loupe centred horizontally on finger, above it
    const loupeLeft = clientX - LOUPE_D / 2;
    const loupeTop  = clientY - LOUPE_D - LOUPE_GAP;
    loupe.style.left    = loupeLeft + 'px';
    loupe.style.top     = loupeTop  + 'px';
    loupe.style.display = 'block';

    // Map client coords to canvas pixel coords
    const scaleX = canvas.width  / cRect.width;
    const scaleY = canvas.height / cRect.height;
    const srcCX  = (clientX - cRect.left) * scaleX;
    const srcCY  = (clientY - cRect.top)  * scaleY;

    // Region to magnify (in canvas pixels)
    const region = LOUPE_D / LOUPE_ZOOM;
    const sx = srcCX - region / 2;
    const sy = srcCY - region / 2;

    loupeCtx.clearRect(0, 0, LOUPE_D, LOUPE_D);
    loupeCtx.save();
    loupeCtx.beginPath();
    loupeCtx.arc(LOUPE_D/2, LOUPE_D/2, LOUPE_D/2, 0, Math.PI*2);
    loupeCtx.clip();
    try {
      loupeCtx.drawImage(canvas, sx, sy, region, region, 0, 0, LOUPE_D, LOUPE_D);
    } catch(err) { /* out of bounds edge case — ignore */ }
    loupeCtx.restore();
  }

  function hideLoupe() {
    loupe.style.display = 'none';
  }

  ['ul','ur','ll','lr'].forEach(corner => {
    const el = document.getElementById('handle-' + corner);
    let dragging = false;
    let startPtrX, startPtrY, startElX, startElY;

    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      dragging  = true;
      startPtrX = e.clientX;
      startPtrY = e.clientY;
      startElX  = handles[corner].x;
      startElY  = handles[corner].y;
      updateLoupe(e.clientX, e.clientY);
    });

    el.addEventListener('pointermove', e => {
      if (!dragging) return;
      e.preventDefault();
      const canvas = document.getElementById('crop-canvas');
      const dx = e.clientX - startPtrX;
      const dy = e.clientY - startPtrY;
      const minX = cropOffX;
      const maxX = cropOffX + canvas.width;
      const minY = cropOffY;
      const maxY = cropOffY + canvas.height;
      const nx = Math.max(minX, Math.min(maxX, startElX + dx));
      const ny = Math.max(minY, Math.min(maxY, startElY + dy));
      setHandlePos(corner, nx, ny);
      drawCropOverlay();
      updateLoupe(e.clientX, e.clientY);
    });

    el.addEventListener('pointerup',     () => { dragging = false; hideLoupe(); });
    el.addEventListener('pointercancel', () => { dragging = false; hideLoupe(); });
  });
}

function confirmCrop() {
  // Convert handle CSS positions to image-native pixel coordinates
  // Handles are in wrap-relative CSS px; canvas is scaled by cropScale
  const canvas = document.getElementById('crop-canvas');
  const pts = {};
  for (const [k, v] of Object.entries(handles)) {
    pts[k] = {
      x: (v.x - cropOffX) / cropScale,
      y: (v.y - cropOffY) / cropScale
    };
  }

  // Derive axis-aligned bounding box of the quad in image pixels
  // (We use AABB for now — sufficient for near-rectangular plates)
  const xs = [pts.ul.x, pts.ur.x, pts.ll.x, pts.lr.x];
  const ys = [pts.ul.y, pts.ur.y, pts.ll.y, pts.lr.y];
  const cropX = Math.max(0, Math.round(Math.min(...xs)));
  const cropY = Math.max(0, Math.round(Math.min(...ys)));
  const cropW = Math.min(blockImg.width  - cropX, Math.round(Math.max(...xs) - Math.min(...xs)));
  const cropH = Math.min(blockImg.height - cropY, Math.round(Math.max(...ys) - Math.min(...ys)));

  blockCrop = { x: cropX, y: cropY, w: cropW, h: cropH };

  // Close modal
  document.getElementById('crop-modal').classList.remove('visible');

  // Draw block with crop registration applied
  sizeCanvases();
  mbCtx.clearRect(0, 0, maskBlock.width, maskBlock.height);
  undoStack.length = 0; updateUndoBtn();
}

// ── Re-register button in toolbar ─────────────────────────────────
function reRegister() {
  if (!blockImg) return;
  openCropModal(blockImg);
}

function loadImage(file, cb) {
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const i = new Image();
    i.onload = () => cb(i);
    i.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

// ── Gouge / mode ───────────────────────────────────────────────────
function setGouge(g) {
  gouge = g;
  document.querySelectorAll('.g-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('g-' + g).classList.add('active');
}

function setMode(m) {
  mode = m;
  document.getElementById('m-carve').classList.toggle('active',   m === 'carve');
  document.getElementById('m-restore').classList.toggle('active', m === 'restore');
}

// ── Size slider ────────────────────────────────────────────────────
const sizeSlider = document.getElementById('size-slider');
const sizeValEl  = document.getElementById('size-val');
function onSize() { sizeValEl.textContent = sizeSlider.value; }
sizeSlider.addEventListener('input',       onSize);
sizeSlider.addEventListener('pointermove', onSize);
sizeSlider.addEventListener('change',      onSize);

// ── Coord mapping ──────────────────────────────────────────────────
// Given a pointer event on the print canvas, return:
//   printX/Y: coords on the erasure canvas
//   blockX/Y: corresponding registered coords on the block mask canvas
function mapCoords(e) {
  const rect = drawPrint.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (drawPrint.width  / rect.width);
  const py = (e.clientY - rect.top)  * (drawPrint.height / rect.height);

  const po = basePrint, bo = baseBlock;
  // Guard: if images not yet mapped, return centre
  if (!po._dw || !bo._dw) return { px, py, bx: px, by: py };

  const nx = (px - po._ox) / po._dw;
  const ny = (py - po._oy) / po._dh;
  const bx = bo._ox + (1 - nx) * bo._dw;
  const by = bo._oy + ny       * bo._dh;

  return { px, py, bx, by };
}

// ── Gouge rendering ────────────────────────────────────────────────
function renderMark(ctx, cx, cy, baseSize, p, isErase, isBlock) {
  try {
  const s  = baseSize * (0.35 + p * 0.65);
  const r  = Math.max(0.5, s / 2);
  const op = 0.5 + p * 0.5;

  if (isErase) {
    ctx.globalCompositeOperation = 'destination-out';
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.3);
    g.addColorStop(0,   `rgba(0,0,0,${op})`);
    g.addColorStop(0.5, `rgba(0,0,0,${op*0.5})`);
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r * 1.3, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    return;
  }

  ctx.globalCompositeOperation = 'source-over';

  // On block, marks are red; on print, marks darken (erase ink)
  const color = isBlock ? `rgba(210,40,20,` : `rgba(0,0,0,`;

  switch (gouge) {
    case 'knife': {
      const kr = Math.max(0.5, r * 0.06);
      ctx.fillStyle = `${color}${Math.min(1, op*1.2)})`;
      ctx.beginPath(); ctx.arc(cx, cy, kr, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'vfine': {
      const rr = Math.max(1, r * 0.12);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rr*4);
      g.addColorStop(0,    `${color}${op})`);
      g.addColorStop(0.15, `${color}${op*0.85})`);
      g.addColorStop(0.45, `${color}${op*0.4})`);
      g.addColorStop(1,    `${color}0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, rr*4, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'vwide': {
      const rr = Math.max(2, r * 0.30);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rr*3.2);
      g.addColorStop(0,    `${color}${op})`);
      g.addColorStop(0.2,  `${color}${op*0.8})`);
      g.addColorStop(0.55, `${color}${op*0.3})`);
      g.addColorStop(1,    `${color}0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, rr*3.2, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'usmall': {
      const rr = Math.max(3, r * 0.55);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rr);
      g.addColorStop(0,    `${color}${op})`);
      g.addColorStop(0.70, `${color}${op})`);
      g.addColorStop(0.90, `${color}${op*0.3})`);
      g.addColorStop(1,    `${color}0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'ularge': {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0,    `${color}${op})`);
      g.addColorStop(0.80, `${color}${op})`);
      g.addColorStop(0.93, `${color}${op*0.25})`);
      g.addColorStop(1,    `${color}0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      break;
    }
  }
  } catch(e) { console.warn('renderMark error:', e.message, cx, cy, r); }
}

function applyStroke(px, py, bx, by) {
  const size = parseInt(sizeSlider.value);
  const isRestore = mode === 'restore';
  // Print: darken (erase print layer) or restore
  renderMark(epCtx, px, py, size, pressure, isRestore, false);
  // Block: red mask or restore
  renderMark(mbCtx, bx, by, size, pressure, isRestore, true);
}

// ── Undo ───────────────────────────────────────────────────────────
function pushUndo() {
  undoStack.push({
    printSnap: epCtx.getImageData(0, 0, erasePrint.width, erasePrint.height),
    blockSnap: mbCtx.getImageData(0, 0, maskBlock.width,  maskBlock.height),
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  updateUndoBtn();
}

function undo() {
  if (!undoStack.length) return;
  const s = undoStack.pop();
  epCtx.putImageData(s.printSnap, 0, 0);
  mbCtx.putImageData(s.blockSnap, 0, 0);
  updateUndoBtn();
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  btn.disabled = undoStack.length === 0;
  document.getElementById('undo-count').textContent =
    undoStack.length > 0 ? ` (${undoStack.length})` : '';
}

function clearAll() {
  pushUndo();
  epCtx.clearRect(0, 0, erasePrint.width, erasePrint.height);
  mbCtx.clearRect(0, 0, maskBlock.width,  maskBlock.height);
}

// ── Toggle original view ───────────────────────────────────────────
function toggleOriginal() {
  showingOriginal = !showingOriginal;
  erasePrint.style.display = showingOriginal ? 'none' : 'block';
  maskBlock.style.display  = showingOriginal ? 'none' : 'block';
  document.getElementById('toggle-btn').classList.toggle('active', showingOriginal);
}

// ── Palm rejection ─────────────────────────────────────────────────
const PEN_TYPES = new Set(['pen', 'mouse']);

document.addEventListener('pointerdown', e => {
  if (e.pointerType === 'pen') {
    penActive = true;
    document.body.style.overflow = 'hidden';
  }
  if (e.pointerType === 'touch' && penActive) {
    e.preventDefault(); e.stopPropagation();
  }
}, { passive: false });

document.addEventListener('pointerup',     e => { if (e.pointerType === 'pen') { penActive = false; document.body.style.overflow = ''; }});
document.addEventListener('pointercancel', e => { if (e.pointerType === 'pen') { penActive = false; document.body.style.overflow = ''; }});
document.addEventListener('touchmove', e => { if (penActive) e.preventDefault(); }, { passive: false });

// ── Drawing on print canvas ────────────────────────────────────────
drawPrint.addEventListener('pointerdown', e => {
  if (!printImg || !blockImg) return;
  if (!PEN_TYPES.has(e.pointerType)) return;
  e.preventDefault();
  drawPrint.setPointerCapture(e.pointerId);
  pressure = e.pressure > 0 ? e.pressure : 1.0;
  document.getElementById('pressure-fill').style.width = (pressure * 100) + '%';
  pushUndo();
  isDrawing = true;
  const c = mapCoords(e);
  lastX = c.px; lastY = c.py;
  applyStroke(c.px, c.py, c.bx, c.by);
  showCrosshair(c.bx, c.by);
});

drawPrint.addEventListener('pointermove', e => {
  if (!isDrawing || !PEN_TYPES.has(e.pointerType)) return;
  e.preventDefault();
  if (e.pressure > 0) {
    pressure = e.pressure;
    document.getElementById('pressure-fill').style.width = (pressure * 100) + '%';
  }
  const c    = mapCoords(e);
  const dist = Math.hypot(c.px - lastX, c.py - lastY);
  const size = parseInt(sizeSlider.value);
  const steps = Math.max(1, Math.floor(dist / Math.max(1, size * 0.18)));
  for (let i = 1; i <= steps; i++) {
    const tx = lastX + (c.px - lastX) * i / steps;
    const ty = lastY + (c.py - lastY) * i / steps;
    const tbx = mapX_fromPrint(tx);
    const tby = mapY_fromPrint(ty);
    applyStroke(tx, ty, tbx, tby);
  }
  lastX = c.px; lastY = c.py;
  showCrosshair(c.bx, c.by);
});

drawPrint.addEventListener('pointerup',     e => { e.preventDefault(); isDrawing = false; hideCrosshair(); });
drawPrint.addEventListener('pointercancel', e => { e.preventDefault(); isDrawing = false; hideCrosshair(); });
drawPrint.addEventListener('pointerleave',  e => { hideCrosshair(); });

// Interpolated block coord helpers
function mapX_fromPrint(px) {
  const po = basePrint, bo = baseBlock;
  if (!po._dw) return 0;
  const nx = (px - po._ox) / po._dw;
  return bo._ox + (1 - nx) * bo._dw;
}
function mapY_fromPrint(py) {
  const po = basePrint, bo = baseBlock;
  if (!po._dh) return 0;
  const ny = (py - po._oy) / po._dh;
  return bo._oy + ny * bo._dh;
}

// ── Crosshair on block ─────────────────────────────────────────────
function showCrosshair(bx, by) {
  const ch = document.getElementById('crosshair');
  const hostRect = document.getElementById('host-block').getBoundingClientRect();
  // bx/by are in canvas pixels; convert to host CSS pixels
  const scaleX = baseBlock.width  / hostRect.width;
  const scaleY = baseBlock.height / hostRect.height;
  ch.style.display  = 'block';
  ch.style.left     = Math.round(bx / scaleX) + 'px';
  ch.style.top      = Math.round(by / scaleY) + 'px';
}

function hideCrosshair() {
  document.getElementById('crosshair').style.display = 'none';
}

// ── Save outputs ───────────────────────────────────────────────────
function compositeAndSave(label, baseC, overlayC, flip) {
  const w = baseC.width, h = baseC.height;
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');
  ctx.drawImage(baseC, 0, 0);
  ctx.drawImage(overlayC, 0, 0);
  if (flip) {
    // save the composited result flipped back to natural orientation
    const fl = document.createElement('canvas');
    fl.width = w; fl.height = h;
    const fCtx = fl.getContext('2d');
    fCtx.translate(w, 0); fCtx.scale(-1, 1);
    fCtx.drawImage(out, 0, 0);
    const a = document.createElement('a');
    a.download = label + '.png';
    a.href = fl.toDataURL('image/png');
    a.click();
  } else {
    const a = document.createElement('a');
    a.download = label + '.png';
    a.href = out.toDataURL('image/png');
    a.click();
  }
}

function savePrint() {
  compositeAndSave('print_marked', basePrint, erasePrint, false);
}

function saveBlock() {
  // Block was drawn mirrored; save flips back to natural block orientation
  compositeAndSave('block_masked', baseBlock, maskBlock, true);
}

// ── Init & resize ──────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Use rAF to ensure CSS layout is complete before we read clientWidth/Height
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      try {
        sizeCanvases();
      } catch(e) {
        console.error('sizeCanvases error:', e);
      }
    });
  });
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', sizeCanvases);
} else {
  window.addEventListener('resize', sizeCanvases);
}
</script>
